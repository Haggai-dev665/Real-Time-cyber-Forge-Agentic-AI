<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Forge AI - Advanced Security Platform</title>
    
    <!-- Core Stylesheets -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/enhanced-sidebar.css">
    <link rel="stylesheet" href="css/backend-integration.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/themes.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/ai-assistant.css">
    
    <!-- External Dependencies -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Chart.js for analytics -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    
    <!-- Leaflet for maps -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- Three.js for 3D visualizations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <!-- Lottie Animations -->
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
</head>
<body>
    <div id="app" class="app">
        <!-- Loading Screen -->
        <div id="loading-screen" class="loading-screen">
            <div class="loading-content">
                <div class="cyber-logo">
                    <div class="logo-icon">
                        <i class="fas fa-shield-halved"></i>
                        <div class="pulse-ring"></div>
                    </div>
                    <span class="logo-text">Cyber Forge AI</span>
                </div>
                <div class="loading-spinner">
                    <div class="spinner-container">
                        <div class="spinner"></div>
                        <div class="spinner-glow"></div>
                    </div>
                </div>
                <p class="loading-text">Initializing Security Platform...</p>
                <div class="loading-progress">
                    <div class="progress-bar">
                        <div class="progress-fill"></div>
                    </div>
                    <span class="progress-text">0%</span>
                </div>
            </div>
        </div>

        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <div class="logo-section">
                    <div class="logo">
                        <i class="fas fa-shield-halved"></i>
                        <span class="logo-text">Cyber Forge AI</span>
                        <span class="version-badge">v4.0</span>
                    </div>
                </div>
                
                <div class="header-center">
                    <div class="global-search">
                        <i class="fas fa-search search-icon"></i>
                        <input type="text" id="global-search" placeholder="Search threats, analyze URLs, or ask AI..." />
                        <div class="search-suggestions" id="search-suggestions"></div>
                        <div class="search-type-toggle">
                            <button class="search-type active" data-type="search" title="Search">
                                <i class="fas fa-search"></i>
                            </button>
                            <button class="search-type" data-type="ai" title="AI Assistant">
                                <i class="fas fa-robot"></i>
                            </button>
                            <button class="search-type" data-type="analyze" title="Quick Analysis">
                                <i class="fas fa-microscope"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="header-actions">
                    <div class="status-indicators">
                        <div class="status-item" id="backend-status" title="Backend Connection">
                            <div class="status-dot"></div>
                            <span>Backend</span>
                        </div>
                        <div class="status-item" id="ml-status" title="ML Services">
                            <div class="status-dot"></div>
                            <span>AI</span>
                        </div>
                        <div class="status-item" id="security-level" title="Security Level">
                            <i class="fas fa-shield-alt"></i>
                            <span>High</span>
                        </div>
                    </div>
                    
                    <div class="header-controls">
                        <button class="control-btn" id="notifications-btn" title="Notifications">
                            <i class="fas fa-bell"></i>
                            <span class="notification-count">0</span>
                        </button>
                        <button class="control-btn" id="theme-toggle" title="Toggle Theme">
                            <i class="fas fa-moon"></i>
                        </button>
                        <button class="control-btn" id="fullscreen-toggle" title="Fullscreen">
                            <i class="fas fa-expand"></i>
                        </button>
                        <button class="control-btn" id="settings-btn" title="Quick Settings">
                            <i class="fas fa-cog"></i>
                        </button>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Layout -->
        <div class="main-layout">
            <!-- Enhanced Sidebar -->
            <aside class="sidebar" id="sidebar">
                <div class="sidebar-header">
                    <button class="sidebar-toggle" id="sidebar-toggle">
                        <i class="fas fa-bars"></i>
                    </button>
                </div>

                <nav class="nav-menu">
                    <!-- Core Features -->
                    <div class="nav-section">
                        <div class="nav-section-title">
                            <i class="fas fa-home"></i>
                            <span>Core Features</span>
                            <button class="section-toggle" data-section="core">
                                <i class="fas fa-chevron-down"></i>
                            </button>
                        </div>
                        <div class="nav-items" data-section-content="core">
                            <button class="nav-item active" data-screen="dashboard">
                                <i class="fas fa-home"></i>
                                <span>Dashboard</span>
                                <div class="item-animation" data-animation="pulse"></div>
                            </button>
                            <button class="nav-item" data-screen="real-time-monitor">
                                <i class="fas fa-chart-line"></i>
                                <span>Real-time Monitor</span>
                                <div class="item-animation" data-animation="data-stream"></div>
                            </button>
                            <button class="nav-item" data-screen="threat-center">
                                <i class="fas fa-exclamation-triangle"></i>
                                <span>Threat Center</span>
                                <span class="alert-badge" id="threat-count">0</span>
                                <div class="item-animation" data-animation="alert-pulse"></div>
                            </button>
                            <button class="nav-item" data-screen="deep-analysis">
                                <i class="fas fa-microscope"></i>
                                <span>Deep Analysis</span>
                                <div class="item-animation" data-animation="scanner"></div>
                            </button>
                            <button class="nav-item" data-screen="overview">
                                <i class="fas fa-th-large"></i>
                                <span>System Overview</span>
                            </button>
                        </div>
                    </div>

                    <!-- AI & Machine Learning -->
                    <div class="nav-section">
                        <div class="nav-section-title">
                            <i class="fas fa-brain"></i>
                            <span>AI & Machine Learning</span>
                            <button class="section-toggle" data-section="ai">
                                <i class="fas fa-chevron-down"></i>
                            </button>
                        </div>
                        <div class="nav-items" data-section-content="ai">
                            <button class="nav-item" data-screen="ai-assistant">
                                <i class="fas fa-robot"></i>
                                <span>AI Assistant</span>
                                <div class="item-animation" data-animation="ai-thinking"></div>
                            </button>
                            <button class="nav-item" data-screen="ml-models">
                                <i class="fas fa-brain"></i>
                                <span>ML Models</span>
                            </button>
                            <button class="nav-item" data-screen="ai-insights">
                                <i class="fas fa-lightbulb"></i>
                                <span>AI Insights</span>
                            </button>
                            <button class="nav-item" data-screen="predictions">
                                <i class="fas fa-crystal-ball"></i>
                                <span>Predictions</span>
                            </button>
                            <button class="nav-item" data-screen="neural-networks">
                                <i class="fas fa-project-diagram"></i>
                                <span>Neural Networks</span>
                            </button>
                            <button class="nav-item" data-screen="training-data">
                                <i class="fas fa-chalkboard-teacher"></i>
                                <span>Training Data</span>
                            </button>
                            <button class="nav-item" data-screen="model-evaluation">
                                <i class="fas fa-chart-pie"></i>
                                <span>Model Evaluation</span>
                            </button>
                        </div>
                    </div>

                    <!-- Security Tools -->
                    <div class="nav-section">
                        <div class="nav-section-title">
                            <i class="fas fa-shield-alt"></i>
                            <span>Security Tools</span>
                            <button class="section-toggle" data-section="security">
                                <i class="fas fa-chevron-down"></i>
                            </button>
                        </div>
                        <div class="nav-items" data-section-content="security">
                            <button class="nav-item" data-screen="vulnerability-scanner">
                                <i class="fas fa-bug"></i>
                                <span>Vuln Scanner</span>
                            </button>
                            <button class="nav-item" data-screen="network-analysis">
                                <i class="fas fa-network-wired"></i>
                                <span>Network Analysis</span>
                            </button>
                            <button class="nav-item" data-screen="malware-detection">
                                <i class="fas fa-virus"></i>
                                <span>Malware Detection</span>
                            </button>
                            <button class="nav-item" data-screen="digital-forensics">
                                <i class="fas fa-fingerprint"></i>
                                <span>Digital Forensics</span>
                            </button>
                            <button class="nav-item" data-screen="penetration-testing">
                                <i class="fas fa-user-ninja"></i>
                                <span>Pentest Tools</span>
                            </button>
                            <button class="nav-item" data-screen="web-security">
                                <i class="fas fa-globe-americas"></i>
                                <span>Web Security</span>
                            </button>
                            <button class="nav-item" data-screen="email-security">
                                <i class="fas fa-envelope-open-text"></i>
                                <span>Email Security</span>
                            </button>
                            <button class="nav-item" data-screen="endpoint-security">
                                <i class="fas fa-laptop"></i>
                                <span>Endpoint Security</span>
                            </button>
                        </div>
                    </div>

                    <!-- Advanced Security -->
                    <div class="nav-section">
                        <div class="nav-section-title">
                            <i class="fas fa-user-secret"></i>
                            <span>Advanced Security</span>
                            <button class="section-toggle" data-section="advanced">
                                <i class="fas fa-chevron-down"></i>
                            </button>
                        </div>
                        <div class="nav-items" data-section-content="advanced">
                            <button class="nav-item" data-screen="incident-response">
                                <i class="fas fa-ambulance"></i>
                                <span>Incident Response</span>
                            </button>
                            <button class="nav-item" data-screen="risk-assessment">
                                <i class="fas fa-balance-scale"></i>
                                <span>Risk Assessment</span>
                            </button>
                            <button class="nav-item" data-screen="security-metrics">
                                <i class="fas fa-chart-bar"></i>
                                <span>Security Metrics</span>
                            </button>
                            <button class="nav-item" data-screen="threat-intelligence">
                                <i class="fas fa-eye"></i>
                                <span>Threat Intelligence</span>
                            </button>
                            <button class="nav-item" data-screen="security-orchestration">
                                <i class="fas fa-cogs"></i>
                                <span>SOAR Platform</span>
                            </button>
                            <button class="nav-item" data-screen="deception-technology">
                                <i class="fas fa-mask"></i>
                                <span>Deception Tech</span>
                            </button>
                        </div>
                    </div>

                    <!-- Backend Integration -->
                    <div class="nav-section">
                        <div class="nav-section-title">
                            <i class="fas fa-server"></i>
                            <span>Backend Integration</span>
                            <button class="section-toggle" data-section="backend">
                                <i class="fas fa-chevron-down"></i>
                            </button>
                        </div>
                        <div class="nav-items" data-section-content="backend">
                            <button class="nav-item" data-screen="api-management">
                                <i class="fas fa-code"></i>
                                <span>API Management</span>
                            </button>
                            <button class="nav-item" data-screen="database-connector">
                                <i class="fas fa-database"></i>
                                <span>Database Connector</span>
                            </button>
                            <button class="nav-item" data-screen="webhook-manager">
                                <i class="fas fa-link"></i>
                                <span>Webhook Manager</span>
                            </button>
                            <button class="nav-item" data-screen="service-health">
                                <i class="fas fa-heartbeat"></i>
                                <span>Service Health</span>
                            </button>
                            <button class="nav-item" data-screen="data-pipeline">
                                <i class="fas fa-stream"></i>
                                <span>Data Pipeline</span>
                            </button>
                        </div>
                    </div>

                    <!-- Data & Analytics -->
                    <div class="nav-section">
                        <div class="nav-section-title">
                            <i class="fas fa-chart-area"></i>
                            <span>Data & Analytics</span>
                            <button class="section-toggle" data-section="data">
                                <i class="fas fa-chevron-down"></i>
                            </button>
                        </div>
                        <div class="nav-items" data-section-content="data">
                            <button class="nav-item" data-screen="datasets">
                                <i class="fas fa-database"></i>
                                <span>Datasets</span>
                            </button>
                            <button class="nav-item" data-screen="reports">
                                <i class="fas fa-file-alt"></i>
                                <span>Reports</span>
                            </button>
                            <button class="nav-item" data-screen="compliance">
                                <i class="fas fa-clipboard-check"></i>
                                <span>Compliance</span>
                            </button>
                            <button class="nav-item" data-screen="data-visualization">
                                <i class="fas fa-chart-line"></i>
                                <span>Data Visualization</span>
                            </button>
                            <button class="nav-item" data-screen="export-tools">
                                <i class="fas fa-download"></i>
                                <span>Export Tools</span>
                            </button>
                        </div>
                    </div>

                    <!-- System Administration -->
                    <div class="nav-section">
                        <div class="nav-section-title">
                            <i class="fas fa-tools"></i>
                            <span>System Administration</span>
                            <button class="section-toggle" data-section="system">
                                <i class="fas fa-chevron-down"></i>
                            </button>
                        </div>
                        <div class="nav-items" data-section-content="system">
                            <button class="nav-item" data-screen="settings">
                                <i class="fas fa-cog"></i>
                                <span>Settings</span>
                            </button>
                            <button class="nav-item" data-screen="profile">
                                <i class="fas fa-user-circle"></i>
                                <span>User Profile</span>
                            </button>
                            <button class="nav-item" data-screen="system-logs">
                                <i class="fas fa-terminal"></i>
                                <span>System Logs</span>
                            </button>
                            <button class="nav-item" data-screen="user-management">
                                <i class="fas fa-users"></i>
                                <span>User Management</span>
                            </button>
                            <button class="nav-item" data-screen="backup-restore">
                                <i class="fas fa-archive"></i>
                                <span>Backup & Restore</span>
                            </button>
                            <button class="nav-item" data-screen="license-manager">
                                <i class="fas fa-key"></i>
                                <span>License Manager</span>
                            </button>
                        </div>
                    </div>
                </nav>

                <!-- Sidebar Footer -->
                <div class="sidebar-footer">
                    <div class="system-stats">
                        <div class="stat-item">
                            <i class="fas fa-cpu"></i>
                            <span id="cpu-usage">--</span>
                        </div>
                        <div class="stat-item">
                            <i class="fas fa-memory"></i>
                            <span id="memory-usage">--</span>
                        </div>
                        <div class="stat-item">
                            <i class="fas fa-wifi"></i>
                            <span id="connection-status">Online</span>
                        </div>
                    </div>
                </div>
            </aside>

            <!-- Main Content Area -->
            <main class="content-area">
                <div id="screen-container" class="screen-container">
                    <!-- Screens will be dynamically loaded here -->
                </div>
            </main>
        </div>

        <!-- Floating Action Button -->
        <div class="fab-container">
            <button class="fab" id="quick-scan-fab" title="Quick Security Scan">
                <i class="fas fa-shield-alt"></i>
            </button>
            <div class="fab-menu" id="fab-menu">
                <button class="fab-item" data-action="scan-url" title="Scan URL">
                    <i class="fas fa-link"></i>
                </button>
                <button class="fab-item" data-action="scan-file" title="Scan File">
                    <i class="fas fa-file"></i>
                </button>
                <button class="fab-item" data-action="ai-chat" title="Quick AI Chat">
                    <i class="fas fa-robot"></i>
                </button>
            </div>
        </div>

        <!-- Notification Toast Container -->
        <div id="toast-container" class="toast-container"></div>

        <!-- Modal Container -->
        <div id="modal-container" class="modal-container"></div>

        <!-- Context Menu -->
        <div id="context-menu" class="context-menu">
            <div class="context-item" data-action="copy">
                <i class="fas fa-copy"></i>
                <span>Copy</span>
            </div>
            <div class="context-item" data-action="share">
                <i class="fas fa-share"></i>
                <span>Share</span>
            </div>
            <div class="context-item" data-action="analyze">
                <i class="fas fa-microscope"></i>
                <span>Analyze</span>
            </div>
            <div class="context-item" data-action="bookmark">
                <i class="fas fa-bookmark"></i>
                <span>Bookmark</span>
            </div>
        </div>
    </div>

    <!-- Utility Scripts -->
    <script src="utils/api-client.js"></script>
    <script src="utils/websocket-manager.js"></script>
    <script src="utils/notification-system.js"></script>
    <script src="utils/theme-manager.js"></script>
    
    <!-- Component Scripts -->
    <script src="components/modal.js"></script>
    <script src="components/chart-factory.js"></script>
    <script src="components/data-table.js"></script>
    <script src="components/lottie-manager.js"></script>
    
    <!-- Screen Scripts -->
    <script src="screens/dashboard.js"></script>
    <script src="screens/real-time-monitor.js"></script>
    <script src="screens/threat-center.js"></script>
    <script src="screens/deep-analysis.js"></script>
    <script src="screens/ai-assistant.js"></script>
    <script src="screens/ml-models.js"></script>
    <script src="screens/ai-insights.js"></script>
    <script src="screens/predictions.js"></script>
    <script src="screens/vulnerability-scanner.js"></script>
    <script src="screens/network-analysis.js"></script>
    <script src="screens/malware-detection.js"></script>
    <script src="screens/digital-forensics.js"></script>
    <script src="screens/datasets.js"></script>
    <script src="screens/reports.js"></script>
    <script src="screens/compliance.js"></script>
    <script src="screens/settings.js"></script>
    <script src="screens/profile.js"></script>
    <script src="screens/system-logs.js"></script>
    
    <!-- Additional Security Screens -->
    <script src="screens/incident-response.js"></script>
    <script src="screens/risk-assessment.js"></script>
    <script src="screens/security-metrics.js"></script>
    <script src="screens/penetration-testing.js"></script>
    
    <!-- Backend Integration Screens -->
    <script src="screens/api-management.js"></script>
    <script src="screens/database-connector.js"></script>
    
    <!-- Main Application Controller -->
    <script src="app.js"></script>
</body>
</html>
