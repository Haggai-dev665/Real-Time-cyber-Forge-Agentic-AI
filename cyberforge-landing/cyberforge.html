<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="preconnect" href="https://unpkg.com" crossorigin />
<link rel="stylesheet" href="cyberforge.css" />

<style>
  /* boot screen — shown until React mounts (JSX is compiled in-browser by Babel) */
  #cf-boot{position:fixed;inset:0;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;background:#1F1A1B}
  #cf-boot svg{animation:cfBoot 1.6s ease-in-out infinite}
  #cf-boot .t{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:rgba(239,233,221,0.5)}
  @keyframes cfBoot{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:1;transform:scale(1.09)}}
</style>

<!-- React (production builds) + Babel standalone — keeps the no-build, single-file workflow -->
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
</head>

<body>
<div id="root">
  <div id="cf-boot">
    <svg width="46" height="46" viewBox="0 0 30 30" aria-hidden="true">
      <rect x="1" y="1" width="28" height="28" fill="none" stroke="rgba(239,233,221,0.45)" stroke-width="1" />
      <path d="M7 22 L15 6 L23 22 Z" fill="#F69D39" />
      <path d="M11 22 L15 14 L19 22 Z" fill="#1F1A1B" />
      <circle cx="15" cy="22" r="1.6" fill="#869B7E" />
    </svg>
    <div class="t">Forging interface…</div>
  </div>
</div>
<script type="text/babel" src="cyberforge.js"></script>
</body>
</html>
