<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Forge AI - Advanced Security Platform</title>
    <link rel="stylesheet" href="advanced-styles.css">
    <link rel="stylesheet" href="dashboard-chat-styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Chart.js for analytics -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Leaflet for maps -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
    <div id="app" class="app">
        <!-- Loading Screen -->
        <div id="loading-screen" class="loading-screen">
            <div class="loading-content">
                <div class="cyber-logo">
                    <i class="fas fa-shield-halved"></i>
                    <span>Cyber Forge AI</span>
                </div>
                <div class="loading-spinner">
                    <div class="spinner"></div>
                </div>
                <p class="loading-text">Initializing Security Platform...</p>
            </div>
        </div>

        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <div class="logo-section">
                    <div class="logo">
                        <i class="fas fa-shield-halved"></i>
                        <span class="logo-text">Cyber Forge AI</span>
                        <span class="version-badge">v3.0</span>
                    </div>
                </div>
                
                <div class="header-center">
                    <div class="global-search">
                        <i class="fas fa-search search-icon"></i>
                        <input type="text" id="global-search" placeholder="Search or ask AI anything..." />
                        <div class="search-type-toggle">
                            <button class="search-type active" data-type="search">
                                <i class="fas fa-search"></i>
                            </button>
                            <button class="search-type" data-type="ai">
                                <i class="fas fa-robot"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="header-actions">
                    <div class="status-indicators">
                        <div class="status-item" id="backend-status" title="Backend Connection">
                            <div class="status-dot"></div>
                            <span>Backend</span>
                        </div>
                        <div class="status-item" id="ml-status" title="ML Services">
                            <div class="status-dot"></div>
                            <span>ML</span>
                        </div>
                        <div class="status-item" id="security-level" title="Security Level">
                            <i class="fas fa-shield-alt"></i>
                            <span>High</span>
                        </div>
                    </div>
                    
                    <div class="header-controls">
                        <button class="control-btn" id="notifications-btn" title="Notifications">
                            <i class="fas fa-bell"></i>
                            <span class="notification-count">3</span>
                        </button>
                        <button class="control-btn" id="theme-toggle" title="Toggle Theme">
                            <i class="fas fa-moon"></i>
                        </button>
                        <button class="control-btn" id="fullscreen-toggle" title="Fullscreen">
                            <i class="fas fa-expand"></i>
                        </button>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Layout -->
        <div class="main-layout">
            <!-- Enhanced Sidebar -->
            <aside class="sidebar">
                <nav class="nav-menu">
                    <!-- Core Features -->
                    <div class="nav-section">
                        <div class="nav-section-title">Core</div>
                        <button class="nav-item active" data-tab="dashboard">
                            <i class="fas fa-home"></i>
                            <span>Dashboard</span>
                        </button>
                        <button class="nav-item" data-tab="real-time">
                            <i class="fas fa-chart-line"></i>
                            <span>Real-time Monitor</span>
                        </button>
                        <button class="nav-item" data-tab="threats">
                            <i class="fas fa-exclamation-triangle"></i>
                            <span>Threat Center</span>
                            <span class="alert-badge" id="threat-count">0</span>
                        </button>
                        <button class="nav-item" data-tab="analysis">
                            <i class="fas fa-microscope"></i>
                            <span>Deep Analysis</span>
                        </button>
                    </div>

                    <!-- AI & ML -->
                    <div class="nav-section">
                        <div class="nav-section-title">AI & ML</div>
                        <button class="nav-item" data-tab="ai-chat">
                            <i class="fas fa-robot"></i>
                            <span>AI Assistant</span>
                        </button>
                        <button class="nav-item" data-tab="ml-models">
                            <i class="fas fa-brain"></i>
                            <span>ML Models</span>
                        </button>
                        <button class="nav-item" data-tab="ai-insights">
                            <i class="fas fa-lightbulb"></i>
                            <span>AI Insights</span>
                        </button>
                        <button class="nav-item" data-tab="predictions">
                            <i class="fas fa-crystal-ball"></i>
                            <span>Predictions</span>
                        </button>
                    </div>

                    <!-- Security Tools -->
                    <div class="nav-section">
                        <div class="nav-section-title">Security Tools</div>
                        <button class="nav-item" data-tab="vulnerability-scan">
                            <i class="fas fa-bug"></i>
                            <span>Vuln Scanner</span>
                        </button>
                        <button class="nav-item" data-tab="network-analysis">
                            <i class="fas fa-network-wired"></i>
                            <span>Network Analysis</span>
                        </button>
                        <button class="nav-item" data-tab="malware-detection">
                            <i class="fas fa-virus"></i>
                            <span>Malware Detection</span>
                        </button>
                        <button class="nav-item" data-tab="forensics">
                            <i class="fas fa-fingerprint"></i>
                            <span>Digital Forensics</span>
                        </button>
                    </div>

                    <!-- Data & Reports -->
                    <div class="nav-section">
                        <div class="nav-section-title">Data & Reports</div>
                        <button class="nav-item" data-tab="datasets">
                            <i class="fas fa-database"></i>
                            <span>Datasets</span>
                        </button>
                        <button class="nav-item" data-tab="reports">
                            <i class="fas fa-file-alt"></i>
                            <span>Reports</span>
                        </button>
                        <button class="nav-item" data-tab="compliance">
                            <i class="fas fa-clipboard-check"></i>
                            <span>Compliance</span>
                        </button>
                    </div>

                    <!-- System -->
                    <div class="nav-section">
                        <div class="nav-section-title">System</div>
                        <button class="nav-item" data-tab="settings">
                            <i class="fas fa-cog"></i>
                            <span>Settings</span>
                        </button>
                        <button class="nav-item" data-tab="profile">
                            <i class="fas fa-user-circle"></i>
                            <span>Profile</span>
                        </button>
                        <button class="nav-item" data-tab="logs">
                            <i class="fas fa-terminal"></i>
                            <span>System Logs</span>
                        </button>
                    </div>
                </nav>

                <!-- Sidebar Footer -->
                <div class="sidebar-footer">
                    <div class="system-stats">
                        <div class="stat-item">
                            <i class="fas fa-cpu"></i>
                            <span id="cpu-usage">--</span>
                        </div>
                        <div class="stat-item">
                            <i class="fas fa-memory"></i>
                            <span id="memory-usage">--</span>
                        </div>
                    </div>
                </div>
            </aside>

            <!-- Main Content Area -->
            <main class="content-area">
                <!-- Content will be dynamically loaded here -->
                <div id="content-container"></div>
            </main>
        </div>

        <!-- Floating Action Button -->
        <div class="fab-container">
            <button class="fab" id="quick-scan-fab" title="Quick Security Scan">
                <i class="fas fa-shield-alt"></i>
            </button>
        </div>

        <!-- Notification Toast Container -->
        <div id="toast-container" class="toast-container"></div>

        <!-- Context Menu -->
        <div id="context-menu" class="context-menu">
            <div class="context-item">
                <i class="fas fa-copy"></i>
                <span>Copy</span>
            </div>
            <div class="context-item">
                <i class="fas fa-share"></i>
                <span>Share</span>
            </div>
            <div class="context-item">
                <i class="fas fa-bookmark"></i>
                <span>Bookmark</span>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="advanced-app.js"></script>
</body>
</html>
