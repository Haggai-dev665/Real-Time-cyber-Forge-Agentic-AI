<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CyberForge — Investigations</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../styles/cyberforge.css" />
<style>
.inv-grid{display:grid;grid-template-columns:340px 1fr;gap:14px;height:calc(100% - 56px);min-height:0}
.col{display:flex;flex-direction:column;gap:14px;min-height:0}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:14px}
.kpi{padding:13px 15px}.kpi .kl{font-family:var(--mono);font-size:9px;letter-spacing:1.5px;color:var(--faint);text-transform:uppercase}
.kpi .kv{font-family:var(--mono);font-size:24px;font-weight:600;margin-top:6px}.kpi .kd{font-size:10px;color:var(--faint);margin-top:2px}

.tabs{display:flex;gap:6px}
.tab{font-family:var(--mono);font-size:9px;letter-spacing:.5px;padding:3px 10px;border-radius:5px;cursor:pointer;border:1px solid var(--border-2);background:var(--surface-2);color:var(--faint);transition:.15s}
.tab.on{color:var(--amber-2);border-color:rgba(245,166,35,.4);background:var(--amber-dim)}

.cases{overflow-y:auto;min-height:0}
.cs{padding:13px 15px;border-bottom:1px solid var(--border);cursor:pointer;position:relative;transition:background .18s}
.cs:hover{background:rgba(130,160,200,.05)}
.cs.sel{background:linear-gradient(90deg,rgba(245,166,35,.1),transparent)} .cs.sel::before{content:"";position:absolute;left:0;top:8px;bottom:8px;width:3px;background:var(--amber);border-radius:0 3px 3px 0}
.cs .ct{font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px}
.cs .cm{font-family:var(--mono);font-size:9.5px;color:var(--faint);margin-top:5px;display:flex;gap:8px;align-items:center}
.cs .cprog{height:4px;border-radius:3px;background:rgba(130,160,200,.12);margin-top:9px;overflow:hidden}
.cs .cprog i{display:block;height:100%;border-radius:3px;background:linear-gradient(90deg,var(--amber),var(--amber-2));transition:width 1s ease}
.cstat{font-family:var(--mono);font-size:8px;letter-spacing:.5px;padding:2px 7px;border-radius:4px;font-weight:600}
.cstat.active{color:var(--amber-2);background:var(--amber-dim)} .cstat.closed{color:var(--green);background:rgba(67,224,138,.12)} .cstat.review{color:var(--cyan);background:var(--cyan-dim)}

/* detail */
.cd-head{display:flex;align-items:flex-start;gap:13px;padding:15px;border-bottom:1px solid var(--border)}
.cd-head .ci{width:42px;height:42px;border-radius:11px;display:grid;place-items:center;flex:none;color:var(--amber-2);border:1px solid rgba(245,166,35,.4);background:radial-gradient(circle at 50% 35%,#3a2a12,#140d04);position:relative}
.cd-head .ci.run::after{content:"";position:absolute;inset:-3px;border-radius:14px;border:1.5px solid transparent;border-top-color:var(--amber);animation:spin 2.2s linear infinite}
.cd-head .ci svg{width:21px;height:21px}
.cd-head .cinfo{flex:1}
.cd-head .cn{font-size:16px;font-weight:600}
.cd-head .cmeta{font-family:var(--mono);font-size:10px;color:var(--faint);margin-top:4px;display:flex;gap:10px}
.cd-body{flex:1;overflow-y:auto;min-height:0;display:grid;grid-template-columns:1fr 290px;gap:0}
.cd-left{padding:15px;border-right:1px solid var(--border)}
.cd-right{padding:15px;display:flex;flex-direction:column;gap:16px}
.sect-t{font-family:var(--mono);font-size:9px;letter-spacing:1.5px;color:var(--faint);text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.sect-t::after{content:"";flex:1;height:1px;background:var(--border)}
.step{display:flex;gap:12px;padding-bottom:16px;position:relative}
.step::before{content:"";position:absolute;left:12px;top:24px;bottom:0;width:1.5px;background:var(--border)}
.step:last-child::before{display:none}
.step .sn{width:25px;height:25px;border-radius:8px;display:grid;place-items:center;flex:none;z-index:2;border:1px solid var(--border-2);background:var(--surface-solid)}
.step .sn svg{width:12px;height:12px}
.step.done .sn{color:var(--green);border-color:rgba(67,224,138,.4)} .step.active .sn{color:var(--amber-2);border-color:rgba(245,166,35,.5);background:var(--amber-dim)}
.step.active .sn::after{content:"";position:absolute;inset:-3px;border-radius:11px;border:1.5px solid transparent;border-top-color:var(--amber);animation:spin 1s linear infinite}
.step .stx{flex:1}
.step .stx b{font-size:12.5px;font-weight:600}
.step .stx .sd{font-size:11px;color:var(--dim);margin-top:2px;line-height:1.5}
.step .stx .stime{font-family:var(--mono);font-size:9px;color:var(--faint);margin-top:3px}
.ent{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);font-size:12px}
.ent .eni{width:26px;height:26px;border-radius:7px;display:grid;place-items:center;flex:none;border:1px solid var(--border-2);background:var(--tile)}
.ent .eni svg{width:13px;height:13px}
.ent .enn{flex:1;font-family:var(--mono);font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ent .ent-type{font-family:var(--mono);font-size:8px;color:var(--faint);letter-spacing:.5px}
.ioc-pill{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10px;padding:5px 9px;border-radius:6px;border:1px solid var(--border);background:var(--tile);margin:0 6px 6px 0;color:var(--dim)}
.ioc-pill .d{width:6px;height:6px;border-radius:50%;background:#ff7185}
</style>
</head>
<body>
<div class="stage">
  <div class="window" data-screen-label="Investigations" id="win">
    <div class="topbar" id="topbar"></div>
    <div class="body">
      <aside class="sidebar" id="sidebar"></aside>
      <main class="main">
        <div class="main-head">
          <div class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg></div>
          <h1>Investigations</h1>
          <div class="head-right">
            <span class="live-ind"><span class="dot"></span>3 active</span>
            <span id="meta">avg resolve 2.4h</span>
            <button class="btn-refresh"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>New Case</button>
          </div>
        </div>

        <div class="kpi-row">
          <div class="card kpi"><div class="kl">Active Cases</div><div class="kv" style="color:var(--amber-2)">3</div><div class="kd">1 critical</div></div>
          <div class="card kpi"><div class="kl">Closed (7d)</div><div class="kv" style="color:var(--green)">28</div><div class="kd">26 resolved</div></div>
          <div class="card kpi"><div class="kl">Mean Resolve</div><div class="kv" style="color:var(--cyan)">2.4<span style="font-size:13px;color:var(--faint)">h</span></div><div class="kd">AI-accelerated</div></div>
          <div class="card kpi"><div class="kl">Linked Alerts</div><div class="kv">41</div><div class="kd">correlated</div></div>
        </div>

        <div class="inv-grid">
          <div class="card" style="display:flex;flex-direction:column;min-height:0">
            <div class="panel-head"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16M4 12h16M4 18h10"/></svg>Cases<span class="right tabs" id="tabs"><span class="tab on" data-t="active">ACTIVE</span><span class="tab" data-t="closed">CLOSED</span></span></div>
            <div class="cases" id="cases"></div>
          </div>

          <div class="card" style="display:flex;flex-direction:column;min-height:0">
            <div class="cd-head" id="cdHead"></div>
            <div class="cd-body">
              <div class="cd-left" style="overflow-y:auto">
                <div class="sect-t">Investigation Timeline</div>
                <div id="steps"></div>
              </div>
              <div class="cd-right" style="overflow-y:auto">
                <div>
                  <div class="sect-t">Linked Entities</div>
                  <div id="entities"></div>
                </div>
                <div>
                  <div class="sect-t">Indicators</div>
                  <div id="iocs"></div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </main>
      <div class="agent-fab" title="CyberForge Agent"><span class="fab-ping"></span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="7" width="16" height="12" rx="3"/><path d="M12 3v4M8 12h.01M16 12h.01M9 16h6"/></svg></div>
    </div>
    <div class="statusbar" id="statusbar"></div>
  </div>
</div>

<script src="../scripts/cyberforge-shared.js"></script>
<script src="../scripts/cf-realtime.js"></script>
<script src="../scripts/cf-live.js"></script>
<script src="../scripts/cf-header.js"></script>
<script src="../scripts/cf-sidebar.js"></script>
<script src="../scripts/cf-footer.js"></script>
<script>
buildHeader({status:'INVESTIGATING'});
buildSidebar('invest');
buildFooter({items:[{txt:'case correlation',cls:'sb-amber'},{txt:'backend-linked',cls:'sb-cyan'},{txt:'Live',cls:'sb-green',spin:true}]});
fitWindow('win');

const cases=[];   // built from REAL backend threats (loadInvestigations / get_threats)
const entIco={host:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="12" rx="2"/><path d="M8 20h8"/></svg>',
  user:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="9" r="3"/><path d="M5 20a7 7 0 0 1 14 0"/></svg>',
  domain:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a14 14 0 0 1 0 18"/></svg>',
  file:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8Z"/><path d="M14 3v5h5"/></svg>',
  ip:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 9h6v6H9z"/></svg>'};
const stepIco={done:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M20 6 9 17l-5-5"/></svg>',
  active:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/></svg>',
  todo:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="8"/></svg>'};

let tab='active', selected=0;
function visibleCases(){return cases.filter(c=>c.st===tab);}
function renderCases(){
  const list=visibleCases();
  if(!list[selected]) selected=0;
  document.getElementById('cases').innerHTML=list.map((c,i)=>
    '<div class="cs'+(i===selected?' sel':'')+'" data-i="'+i+'"><div class="ct">'+c.n+' <span class="cstat '+(c.st==='closed'?'closed':'active')+'">'+c.st.toUpperCase()+'</span></div>'+
    '<div class="cm"><span class="pill '+(c.sev==='crit'?'crit':c.sev==='low'?'low':'med')+'">'+c.sev.toUpperCase()+'</span><span>'+c.id+'</span><span>'+c.alerts+' alerts</span><span>'+c.opened+'</span></div>'+
    '<div class="cprog"><i style="width:'+c.prog+'%"></i></div></div>').join('') || '<div style="padding:30px;text-align:center;color:var(--faint);font-family:var(--mono);font-size:11px">No '+tab+' cases</div>';
  document.querySelectorAll('#cases .cs').forEach(el=>el.addEventListener('click',()=>{selected=+el.dataset.i;renderCases();renderCase();}));
}
function renderCase(){
  const c=visibleCases()[selected]; if(!c){document.getElementById('cdHead').innerHTML='';document.getElementById('steps').innerHTML='';return;}
  document.getElementById('cdHead').innerHTML=
    '<span class="ci '+(c.run?'run':'')+'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg></span>'+
    '<div class="cinfo"><div class="cn">'+c.n+'</div><div class="cmeta"><span>'+c.id+'</span><span>'+c.assignee+'</span><span>'+c.alerts+' linked alerts</span><span class="pill '+(c.sev==='crit'?'crit':c.sev==='low'?'low':'med')+'">'+c.sev.toUpperCase()+'</span></div></div>'+
    '<div style="text-align:right;font-family:var(--mono)"><div style="font-size:22px;font-weight:600;color:var(--amber-2)">'+c.prog+'%</div><div style="font-size:9px;color:var(--faint);letter-spacing:1px">PROGRESS</div></div>';
  document.getElementById('steps').innerHTML=c.steps.map(s=>
    '<div class="step '+s[0]+'"><span class="sn">'+stepIco[s[0]]+'</span><div class="stx"><b>'+s[1]+'</b><div class="sd">'+s[2]+'</div><div class="stime">'+s[3]+'</div></div></div>').join('');
  document.getElementById('entities').innerHTML=c.ents.map(e=>
    '<div class="ent"><span class="eni" style="color:'+(e[2]==='c2'||e[2]==='phishing'||e[2]==='payload'?'#ff7185':'var(--cyan)')+'">'+entIco[e[0]]+'</span><span class="enn">'+e[1]+'</span><span class="ent-type">'+e[2].toUpperCase()+'</span></div>').join('');
  document.getElementById('iocs').innerHTML=c.iocs.map(i=>'<span class="ioc-pill"><span class="d"></span>'+i+'</span>').join('');
}
renderCases(); renderCase();
document.querySelectorAll('.kpi .kv').forEach(function(e){ e.textContent='0'; });   // real counts fill from get_threats
document.querySelectorAll('#tabs .tab').forEach(t=>t.addEventListener('click',()=>{
  document.querySelectorAll('#tabs .tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');tab=t.dataset.t;selected=0;renderCases();renderCase();
}));

// ===== REAL cases — built from live threats (get_threats) =====
function threatToCase(x,i){
  const det=x.detection||{}; const sev=String(x.severity||'medium').toLowerCase();
  const sv=sev==='critical'?'crit':(sev==='high'?'high':(sev==='low'?'low':'med'));
  const st=['resolved','dismissed','mitigated','false_positive','closed'].includes(String(x.status||'').toLowerCase())?'closed':'active';
  const ind=x.indicator||x.url||'';
  const etype=/^https?:/.test(ind)?'domain':(/^[0-9.]+$/.test(ind)?'ip':(/^[a-f0-9]{32,}$/i.test(ind)?'file':'domain'));
  const risk=(x.riskScore!=null?x.riskScore:0);
  return {
    id:'CASE-'+String(x.id||x._id||(2000+i)).slice(-4),
    n:(x.title||x.type||x.category||ind||'Threat Investigation'),
    sev:sv, st:st, prog:st==='closed'?100:Math.max(20,Math.min(94,40+risk/2)),
    assignee:'CyberForge Agent', alerts:(Array.isArray(x.indicators)?x.indicators.length:1), opened:'live', run:st!=='closed',
    steps:[
      ['done','Detection',((x.source||det.source||'agent'))+' detected '+(x.type||x.category||'threat'),''],
      ['done','Triage','ML classified — risk '+(risk||'—'),''],
      [st==='closed'?'done':'active', st==='closed'?'Resolved':'Containment', st==='closed'?'Case resolved':'Mitigation in progress','']
    ],
    ents: ind?[[etype, ind, (x.category||'indicator')]]:[],
    iocs: [ind].filter(Boolean)
  };
}
async function loadInvestigations(){
  try{
    const r=await CF.invoke('get_threats'); const d=(r&&r.data)||{}; const arr=d.threats||[];
    if(arr.length){
      cases.length=0; arr.map(threatToCase).forEach(c=>cases.push(c));
      selected=0; renderCases(); renderCase();
      const kv=document.querySelectorAll('.kpi .kv');
      if(kv[0]) kv[0].textContent=cases.filter(c=>c.st==='active').length;
      if(kv[3]) kv[3].textContent=(d.total||arr.length);
    }
  }catch(e){ /* keep seed cases */ }
}
loadInvestigations(); setInterval(loadInvestigations,30000);
window.addEventListener('cf:threat', e=>{ const x=e.detail||{}; cases.unshift(threatToCase(x,cases.length));
  if(cases.length>40)cases.pop(); renderCases(); });
</script>
</body>
</html>
