<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CyberForge — Scheduled</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../styles/cyberforge.css" />
<style>
.sch-grid{display:grid;grid-template-columns:1fr 360px;gap:14px;height:calc(100% - 56px);min-height:0}
.col{display:flex;flex-direction:column;gap:14px;min-height:0}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:14px}
.kpi{padding:13px 15px}
.kpi .kl{font-family:var(--mono);font-size:9px;letter-spacing:1.5px;color:var(--faint);text-transform:uppercase}
.kpi .kv{font-family:var(--mono);font-size:24px;font-weight:600;margin-top:6px}
.kpi .kd{font-size:10px;color:var(--faint);margin-top:2px}

.jobs{overflow-y:auto;min-height:0}
.job{display:flex;align-items:center;gap:14px;padding:13px 15px;border-bottom:1px solid var(--border);transition:background .2s}
.job:hover{background:rgba(130,160,200,.05)}
.ring-wrap{position:relative;width:46px;height:46px;flex:none}
.ring-wrap .rt{position:absolute;inset:0;display:grid;place-items:center;font-family:var(--mono);font-size:9px;font-weight:600;color:var(--amber-2)}
.job .jinfo{flex:1;min-width:0}
.job .jn{font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px}
.job .jc{font-family:var(--mono);font-size:10px;color:var(--faint);margin-top:3px}
.job .jnext{text-align:right;flex:none;font-family:var(--mono)}
.job .jnext .nx{font-size:12px;color:var(--text);font-weight:600}
.job .jnext .nl{font-size:8.5px;letter-spacing:1px;color:var(--faint);text-transform:uppercase;margin-top:2px}
.recur{font-family:var(--mono);font-size:8.5px;letter-spacing:.5px;padding:2px 7px;border-radius:4px;font-weight:600}
.recur.hourly{color:var(--cyan);background:var(--cyan-dim);border:1px solid rgba(43,212,238,.3)}
.recur.daily{color:var(--amber-2);background:var(--amber-dim);border:1px solid rgba(245,166,35,.3)}
.recur.weekly{color:var(--green);background:rgba(67,224,138,.12);border:1px solid rgba(67,224,138,.3)}
.recur.cont{color:var(--blue);background:rgba(90,169,230,.12);border:1px solid rgba(90,169,230,.3)}
.jtoggle{width:34px;height:19px;border-radius:10px;background:rgba(67,224,138,.25);position:relative;cursor:pointer;transition:.2s;flex:none}
.jtoggle::after{content:"";position:absolute;width:15px;height:15px;border-radius:50%;background:var(--green);top:2px;left:17px;transition:.2s;box-shadow:0 0 6px var(--green)}
.jtoggle.off{background:rgba(130,160,200,.18)} .jtoggle.off::after{left:2px;background:var(--faint);box-shadow:none}
.jrun{width:30px;height:30px;border-radius:8px;flex:none;display:grid;place-items:center;cursor:pointer;color:var(--amber-2);
  border:1px solid var(--border-2);background:var(--surface-2);opacity:0;transition:.18s}
.job:hover .jrun{opacity:1}
.jrun:hover{border-color:rgba(245,166,35,.4);background:var(--amber-dim)} .jrun:active{transform:scale(.9)}
.jrun svg{width:14px;height:14px} .jrun.busy svg{animation:spin .7s linear infinite}

/* upcoming timeline */
.upnext{overflow-y:auto;min-height:0;padding:4px 0}
.up{display:flex;gap:12px;padding:9px 15px;position:relative}
.up::before{content:"";position:absolute;left:21px;top:26px;bottom:-2px;width:1.5px;background:var(--border)}
.up:last-child::before{display:none}
.up .ut{font-family:var(--mono);font-size:10px;color:var(--amber-2);width:46px;flex:none;text-align:right}
.up .un{width:11px;height:11px;border-radius:50%;border:2px solid var(--amber);background:var(--surface-solid);flex:none;margin-top:1px;z-index:2}
.up.soon .un{box-shadow:0 0 8px var(--amber);animation:pulse 1.6s infinite}
.up .ub{flex:1}
.up .ub .ut2{font-size:12px;font-weight:500}
.up .ub .ud{font-family:var(--mono);font-size:9.5px;color:var(--faint);margin-top:1px}
.runlog{padding:4px 0;overflow-y:auto}
.rl{display:flex;align-items:center;gap:10px;padding:8px 15px;font-family:var(--mono);font-size:11px;border-bottom:1px solid var(--border)}
.rl .rok{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 5px var(--green);flex:none}
.rl .rn{flex:1;color:var(--dim)}
.rl .rd{color:var(--faint);font-size:9.5px}
</style>
</head>
<body>
<div class="stage">
  <div class="window" data-screen-label="Scheduled" id="win">
    <div class="topbar" id="topbar"></div>
    <div class="body">
      <aside class="sidebar" id="sidebar"></aside>
      <main class="main">
        <div class="main-head">
          <div class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg></div>
          <h1>Scheduled</h1>
          <div class="head-right">
            <span class="live-ind"><span class="dot"></span>Active</span>
            <span id="nextrun">Next run in 00:42</span>
            <button class="btn-refresh"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>New Job</button>
          </div>
        </div>

        <div class="kpi-row">
          <div class="card kpi"><div class="kl">Active Jobs</div><div class="kv" style="color:var(--amber-2)">9</div><div class="kd">2 paused</div></div>
          <div class="card kpi"><div class="kl">Runs Today</div><div class="kv" style="color:var(--cyan)" id="kRuns">214</div><div class="kd">0 failed</div></div>
          <div class="card kpi"><div class="kl">Success Rate</div><div class="kv" style="color:var(--green)">99.7%</div><div class="kd">rolling 7d</div></div>
          <div class="card kpi"><div class="kl">Avg Duration</div><div class="kv">3.4<span style="font-size:13px;color:var(--faint)">s</span></div><div class="kd">per run</div></div>
        </div>

        <div class="sch-grid">
          <div class="card" style="display:flex;flex-direction:column;min-height:0">
            <div class="panel-head"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>Scheduled Jobs<span class="right">9 active</span></div>
            <div class="jobs" id="jobs"></div>
          </div>
          <div class="col">
            <div class="card" style="flex:1;display:flex;flex-direction:column;min-height:0">
              <div class="panel-head"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>Up Next</div>
              <div class="upnext" id="upnext"></div>
            </div>
            <div class="card" style="flex:1;display:flex;flex-direction:column;min-height:0">
              <div class="panel-head"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>Recent Runs<span class="right"><span class="badge-live"><span class="dot"></span>LIVE</span></span></div>
              <div class="runlog" id="runlog"></div>
            </div>
          </div>
        </div>
      </main>
      <div class="agent-fab" title="CyberForge Agent"><span class="fab-ping"></span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="7" width="16" height="12" rx="3"/><path d="M12 3v4M8 12h.01M16 12h.01M9 16h6"/></svg></div>
    </div>
    <div class="statusbar" id="statusbar"></div>
  </div>
</div>

<script src="../scripts/cyberforge-shared.js"></script>
<script src="../scripts/cf-header.js"></script>
<script src="../scripts/cf-sidebar.js"></script>
<script src="../scripts/cf-footer.js"></script>
<script>
buildHeader({status:'SCHEDULER'});
buildSidebar('scheduled');
buildFooter({items:[{txt:'9 jobs active',cls:'sb-amber'},{txt:'214 runs today',cls:'sb-cyan'},{txt:'99.7% success',cls:'sb-green'},{txt:'Scheduler online',cls:'sb-green',spin:true}]});
fitWindow('win');

const jobs=[
  {n:'Fleet Threat Sweep',c:'0 */1 * * *',r:'hourly',next:42,on:true},
  {n:'IOC Feed Sync',c:'*/15 * * * *',r:'hourly',next:128,on:true},
  {n:'Model Retrain — phish-bert',c:'0 2 * * *',r:'daily',next:3540,on:true},
  {n:'Vulnerability Scan',c:'0 */6 * * *',r:'daily',next:880,on:true},
  {n:'Compliance Report',c:'0 8 * * 1',r:'weekly',next:6200,on:true},
  {n:'Endpoint Telemetry Flush',c:'continuous',r:'cont',next:8,on:true},
  {n:'Domain Reputation Refresh',c:'0 */3 * * *',r:'daily',next:1450,on:true},
  {n:'Backup Evidence Locker',c:'0 4 * * *',r:'daily',next:4100,on:true},
  {n:'Anomaly Baseline Recalc',c:'0 0 * * 0',r:'weekly',next:5400,on:false}
];
function fmt(s){if(s<60)return '00:'+String(s).padStart(2,'0');const m=Math.floor(s/60);if(m<60)return String(m).padStart(2,'0')+':'+String(s%60).padStart(2,'0');const h=Math.floor(m/60);return h+'h '+String(m%60).padStart(2,'0')+'m';}
function ring(svg,frac,color){const cx=23,cy=23,r=18,sw=4,C=2*Math.PI*r;
  svg.innerHTML='<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="rgba(126,148,184,.16)" stroke-width="'+sw+'"/>'+
  '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="'+color+'" stroke-width="'+sw+'" stroke-linecap="round" '+
  'stroke-dasharray="'+(C*frac).toFixed(1)+' '+C+'" transform="rotate(-90 '+cx+' '+cy+')"/>';}

const jobsEl=document.getElementById('jobs');
jobsEl.innerHTML=jobs.map((j,i)=>
  '<div class="job"><div class="ring-wrap"><svg width="46" height="46" viewBox="0 0 46 46" id="jr'+i+'"></svg><span class="rt" id="jt'+i+'">'+fmt(j.next)+'</span></div>'+
  '<div class="jinfo"><div class="jn">'+j.n+' <span class="recur '+j.r+'">'+j.r.toUpperCase()+'</span></div><div class="jc">'+j.c+'</div></div>'+
  '<div class="jnext"><div class="nx">'+(j.on?'armed':'paused')+'</div><div class="nl">'+(j.on?'next run':'disabled')+'</div></div>'+
  '<div class="jrun" data-i="'+i+'" title="Run now"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 4 14 8-14 8Z"/></svg></div>'+
  '<div class="jtoggle'+(j.on?'':' off')+'" data-i="'+i+'"></div></div>').join('');
const maxNext=jobs.map(j=>j.next);
function tick(){
  jobs.forEach((j,i)=>{
    const sv=document.getElementById('jr'+i),tx=document.getElementById('jt'+i);
    if(j.on){ j.next--; if(j.next<=0){ j.next=maxNext[i]; flashRun(j.n); }
      const frac=1-j.next/maxNext[i]; ring(sv,frac, j.next<30?'var(--red)':'var(--amber)'); tx.textContent=fmt(j.next);
    } else { ring(sv,0,'rgba(130,160,200,.2)'); tx.textContent='—'; tx.style.color='var(--faint)'; }
  });
  buildUpNext();
}
jobs.forEach((j,i)=>ring(document.getElementById('jr'+i), j.on?1-j.next/maxNext[i]:0,'var(--amber)'));
setInterval(tick,1000);
jobsEl.querySelectorAll('.jtoggle').forEach(t=>t.addEventListener('click',()=>{const i=+t.dataset.i;jobs[i].on=!jobs[i].on;t.classList.toggle('off');}));
jobsEl.querySelectorAll('.jrun').forEach(b=>b.addEventListener('click',()=>{
  const i=+b.dataset.i; b.classList.add('busy');
  flashRun(jobs[i].n+' (manual)'); jobs[i].next=maxNext[i];
  setTimeout(()=>b.classList.remove('busy'),900);
}));

// up next
function buildUpNext(){
  const up=[...jobs].filter(j=>j.on).sort((a,b)=>a.next-b.next).slice(0,7);
  document.getElementById('upnext').innerHTML=up.map((j,i)=>
    '<div class="up'+(i===0?' soon':'')+'"><span class="ut">'+fmt(j.next)+'</span><span class="un"></span>'+
    '<div class="ub"><div class="ut2">'+j.n+'</div><div class="ud">'+j.r+' · '+j.c+'</div></div></div>').join('');
}
buildUpNext();

// recent runs log
const runlog=document.getElementById('runlog');
const past=['Fleet Threat Sweep','IOC Feed Sync','Endpoint Telemetry Flush','Domain Reputation Refresh','Vulnerability Scan'];
function flashRun(name){
  const el=document.createElement('div'); el.className='rl';
  const now=new Date(); const ts=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0')+':'+String(now.getSeconds()).padStart(2,'0');
  el.innerHTML='<span class="rok"></span><span class="rn">'+name+'</span><span class="rd">'+ts+' · '+(1+Math.random()*4).toFixed(1)+'s</span>';
  runlog.prepend(el); while(runlog.children.length>30) runlog.lastChild.remove();
  const kr=document.getElementById('kRuns'); kr.textContent=+kr.textContent+1;
}
for(let i=0;i<6;i++) flashRun(past[Math.floor(Math.random()*past.length)]);

// header countdown mirror
setInterval(()=>{const soonest=Math.min(...jobs.filter(j=>j.on).map(j=>j.next));document.getElementById('nextrun').textContent='Next run in '+fmt(soonest);},1000);
</script>
</body>
</html>
