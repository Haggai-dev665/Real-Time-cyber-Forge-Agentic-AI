<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CyberForge AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Space+Grotesk:wght@500;600;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    /* ── Tokens (teal/cyan brand) ── */
    :root {
        --bg: #080d14; --surface: #0d1520;
        --accent: #2dd4bf; --accent2: #0d9488;
        --info: #1570EF;
        --text: #e8eef4; --text2: #7a8fa0; --text3: #3a4a5a;
        --glow: rgba(45,212,191,.28);
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%;overflow:hidden;font-family:'Roboto',system-ui,sans-serif;background:var(--bg);color:var(--text)}
    body{display:flex;align-items:center;justify-content:center;-webkit-user-select:none;user-select:none}

    /* Grid */
    .bg-grid{position:fixed;inset:0;overflow:hidden;pointer-events:none;z-index:0}
    .bg-grid::before{content:'';position:absolute;inset:-50%;width:200%;height:200%;
        background:repeating-linear-gradient(0deg,transparent 0,transparent 59px,rgba(45,212,191,.025) 59px,rgba(45,212,191,.025) 60px),
                   repeating-linear-gradient(90deg,transparent 0,transparent 59px,rgba(45,212,191,.025) 59px,rgba(45,212,191,.025) 60px);
        animation:gridDrift 40s linear infinite}
    @keyframes gridDrift{to{transform:translate(60px,60px)}}

    /* Radial glow */
    .bg-glow{position:fixed;inset:0;
        background:radial-gradient(600px circle at 50% 45%,rgba(45,212,191,.08),transparent 65%),
                   radial-gradient(400px circle at 52% 48%,rgba(13,148,136,.06),transparent 55%);
        pointer-events:none;z-index:1}

    /* Particles */
    .particles{position:fixed;inset:0;z-index:1;pointer-events:none}
    .particle{position:absolute;width:2.5px;height:2.5px;background:var(--accent);border-radius:50%;opacity:0;animation:particleFade 4s ease-in-out infinite}
    .particle:nth-child(1){top:20%;left:15%;animation-delay:0s}
    .particle:nth-child(2){top:70%;left:82%;animation-delay:.55s}
    .particle:nth-child(3){top:38%;left:91%;animation-delay:1.1s}
    .particle:nth-child(4){top:82%;left:23%;animation-delay:1.75s}
    .particle:nth-child(5){top:10%;left:63%;animation-delay:2.4s}
    .particle:nth-child(6){top:55%;left:9%; animation-delay:.85s}
    .particle:nth-child(7){top:28%;left:51%;animation-delay:1.5s}
    .particle:nth-child(8){top:86%;left:59%;animation-delay:2.1s}
    .particle:nth-child(9){top:48%;left:72%;animation-delay:.3s}
    .particle:nth-child(10){top:64%;left:37%;animation-delay:3.0s;background:var(--info)}
    @keyframes particleFade{0%,100%{opacity:0;transform:translateY(0) scale(.5)}50%{opacity:.5;transform:translateY(-20px) scale(1)}}

    /* Scan line */
    .scan-line{position:fixed;left:0;right:0;height:1px;z-index:2;pointer-events:none;
        background:linear-gradient(90deg,transparent 0%,rgba(45,212,191,.18) 50%,transparent 100%);
        animation:scanDown 4.5s ease-in-out infinite}
    .scan-line:nth-child(2){animation-delay:2.25s;opacity:.45}
    @keyframes scanDown{0%{top:-2px;opacity:0}8%{opacity:1}92%{opacity:1}100%{top:100%;opacity:0}}

    /* Main content */
    .splash-center{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;
        opacity:0;animation:fadeInUp .75s ease-out .15s forwards}
    @keyframes fadeInUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

    /* Logo */
    .logo-wrap{position:relative;width:128px;height:128px;margin-bottom:24px}
    .logo-ring{position:absolute;inset:-8px;border-radius:50%;
        border:1.5px solid transparent;
        border-top-color:var(--accent);border-right-color:rgba(45,212,191,.2);
        animation:ringSpin 2.4s linear infinite;opacity:.55}
    .logo-ring-outer{position:absolute;inset:-18px;border-radius:50%;
        border:1px solid transparent;
        border-bottom-color:var(--info);border-left-color:rgba(21,112,239,.15);
        animation:ringSpinRev 3.5s linear infinite;opacity:.35}
    @keyframes ringSpin   {to{transform:rotate(360deg)}}
    @keyframes ringSpinRev{to{transform:rotate(-360deg)}}

    .logo-inner{
        width:128px;height:128px;border-radius:22px;
        background:var(--surface);border:1px solid rgba(45,212,191,.18);
        display:flex;align-items:center;justify-content:center;
        box-shadow:0 0 40px var(--glow);
        animation:logoPulse 3s ease-in-out infinite}
    @keyframes logoPulse{0%,100%{box-shadow:0 0 30px var(--glow)}50%{box-shadow:0 0 55px rgba(45,212,191,.35)}}
    .logo-inner i{font-size:2.8rem;color:var(--accent);filter:drop-shadow(0 0 8px rgba(45,212,191,.5))}
    .logo-inner img{width:80px;height:80px;object-fit:contain;filter:drop-shadow(0 0 8px var(--glow))}

    /* Brand */
    .brand{font-family:'Space Grotesk','Roboto',sans-serif;font-size:2rem;font-weight:700;letter-spacing:.07em;margin-bottom:4px}
    .brand-cyber{color:var(--text)}
    .brand-forge{color:var(--accent)}
    .tagline{font-size:.72rem;color:var(--text2);letter-spacing:.14em;text-transform:uppercase;font-weight:400;margin-bottom:8px;
        font-family:'Roboto Mono',monospace}

    /* Version chip */
    .version-chip{
        display:inline-flex;align-items:center;gap:5px;
        border:1px solid rgba(45,212,191,.18);border-radius:99px;
        padding:3px 10px;font-size:.65rem;color:var(--text2);
        font-family:'Roboto Mono',monospace;margin-bottom:36px;
        background:rgba(45,212,191,.04);
    }
    .version-chip i{color:var(--accent);font-size:.6rem}

    /* Progress */
    .progress-track{width:240px;height:3px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden;margin-bottom:12px;position:relative}
    .progress-fill{height:100%;width:0%;background:var(--accent);border-radius:3px;transition:width .32s ease-out;position:relative}
    .progress-fill::after{content:'';position:absolute;right:0;top:50%;transform:translateY(-50%);
        width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent)}

    .progress-label{display:flex;align-items:center;justify-content:space-between;width:240px;margin-bottom:16px}
    .progress-pct{font-size:.68rem;font-family:'Roboto Mono',monospace;color:var(--accent);font-weight:500}
    .progress-of {font-size:.65rem;color:var(--text3);font-family:'Roboto Mono',monospace}

    /* Status */
    .status-row{display:flex;align-items:center;gap:7px;margin-bottom:24px}
    .status-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);
        animation:dotBlink 1.8s ease-in-out infinite}
    @keyframes dotBlink{0%,100%{opacity:1}50%{opacity:.3}}
    .status{font-size:.7rem;color:var(--text2);font-family:'Roboto Mono',monospace;letter-spacing:.04em;
        min-width:220px;text-align:center}

    /* Feature chips */
    .feature-chips{display:flex;gap:7px;flex-wrap:wrap;justify-content:center}
    .chip{display:flex;align-items:center;gap:5px;
        padding:4px 10px;border-radius:99px;
        border:1px solid rgba(45,212,191,.14);background:rgba(45,212,191,.04);
        font-size:.66rem;color:var(--text2);font-family:'Roboto',sans-serif;
        animation:fadeInUp .6s ease-out both}
    .chip:nth-child(1){animation-delay:.3s}
    .chip:nth-child(2){animation-delay:.48s}
    .chip:nth-child(3){animation-delay:.66s}
    .chip:nth-child(4){animation-delay:.84s}
    .chip i{color:var(--accent);font-size:.6rem}

    /* Copyright */
    .splash-footer{position:fixed;bottom:14px;left:0;right:0;text-align:center;
        font-size:.62rem;color:var(--text3);font-family:'Roboto',sans-serif;z-index:10}
  </style>
</head>
<body>

  <div class="bg-grid"></div>
  <div class="bg-glow"></div>
  <div class="scan-line"></div>
  <div class="scan-line"></div>
  <div class="particles">
    <div class="particle"></div><div class="particle"></div><div class="particle"></div>
    <div class="particle"></div><div class="particle"></div><div class="particle"></div>
    <div class="particle"></div><div class="particle"></div>
    <div class="particle"></div><div class="particle"></div>
  </div>

  <div class="splash-center">
    <div class="logo-wrap">
      <div class="logo-ring-outer"></div>
      <div class="logo-ring"></div>
      <div class="logo-inner">
        <img src="../assets/logo-icon.png" alt="CyberForge"
             onerror="this.style.display='none';this.parentNode.querySelector('i').style.display='block'">
        <i class="fas fa-shield-halved" style="display:none"></i>
      </div>
    </div>

    <div class="brand">
      <span class="brand-cyber">Cyber</span><span class="brand-forge">Forge</span>
    </div>
    <div class="tagline">Agentic Cyber Intelligence</div>
    <div class="version-chip"><i class="fas fa-code-branch"></i> v2.0 &bull; Research Edition</div>

    <div class="progress-track">
      <div class="progress-fill" id="progress"></div>
    </div>
    <div class="progress-label">
      <span class="progress-pct" id="pct">0%</span>
      <span class="progress-of">Secure Boot</span>
    </div>

    <div class="status-row">
      <div class="status-dot"></div>
      <div class="status" id="status">Initializing…</div>
    </div>

    <div class="feature-chips">
      <span class="chip"><i class="fas fa-shield-halved"></i> Threat Detection</span>
      <span class="chip"><i class="fas fa-brain"></i> Gemini 2.5 Flash</span>
      <span class="chip"><i class="fas fa-network-wired"></i> 8-Agent Orchestrator</span>
      <span class="chip"><i class="fas fa-database"></i> Appwrite Cloud</span>
    </div>
  </div>

  <div class="splash-footer">&copy; 2026 CyberForge AI &mdash; Research Thesis Platform</div>

  <script>
    /**
     * Splash Screen — Entry Point Router
     * Checks setup + auth state, then routes to the correct page.
     * Shows an animated splash instead of flashing the wizard.
     */
    (function () {
      var progress = document.getElementById('progress');
      var status   = document.getElementById('status');
      var pctEl    = document.getElementById('pct');

      var BACKEND_URL = localStorage.getItem('cyberforge_backend_url') ||
                        'https://cyberforge-ddd97655464f.herokuapp.com';

      function setProgress(pct, msg) {
        if (progress) progress.style.width = pct + '%';
        if (pctEl)    pctEl.textContent = Math.round(pct) + '%';
        if (status && msg) status.textContent = msg;
      }

      function navigate(url) {
        setProgress(100, 'Launching…');
        setTimeout(function () {
          try { window.location.replace(url); } catch (_) { window.location.href = url; }
        }, 400);
      }

      async function validateToken(token) {
        try {
          var controller = new AbortController();
          var timeout = setTimeout(function () { controller.abort(); }, 8000);
          var resp = await fetch(BACKEND_URL + '/api/auth/profile', {
            method: 'GET',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': 'Bearer ' + token
            },
            signal: controller.signal
          });
          clearTimeout(timeout);
          return resp.ok;
        } catch (_) {
          return false;
        }
      }

      async function tryRefresh(token) {
        try {
          var resp = await fetch(BACKEND_URL + '/api/auth/refresh', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': 'Bearer ' + token
            },
            body: JSON.stringify({ refreshToken: token })
          });
          if (!resp.ok) return false;
          var data = await resp.json();
          var nested = data.data || data;
          var newToken = data.token || nested.token;
          if (!newToken) return false;
          localStorage.setItem('authToken', newToken);
          if (data.user || nested.user) {
            localStorage.setItem('user', JSON.stringify(data.user || nested.user));
          }
          return true;
        } catch (_) {
          return false;
        }
      }

      async function boot() {
        // Step 1: Check if setup has been completed
        setProgress(15, 'Checking configuration…');
        await new Promise(function (r) { setTimeout(r, 300); });

        var setupDone = localStorage.getItem('cyberforge_setup_complete') === 'true';
        if (!setupDone) {
          setProgress(50, 'First-time setup required…');
          await new Promise(function (r) { setTimeout(r, 400); });
          navigate('setup-wizard.html');
          return;
        }

        // Step 2: Check for stored auth token
        setProgress(35, 'Checking session…');
        await new Promise(function (r) { setTimeout(r, 250); });

        var token = localStorage.getItem('authToken') || sessionStorage.getItem('authToken');

        // Try Electron/Tauri secure storage
        if (!token && window.electronAPI && window.electronAPI.auth && window.electronAPI.auth.getToken) {
          try {
            var result = await window.electronAPI.auth.getToken();
            if (result && result.token) {
              token = result.token;
              localStorage.setItem('authToken', token);
            }
          } catch (_) {}
        }

        if (!token) {
          setProgress(70, 'Sign-in required…');
          await new Promise(function (r) { setTimeout(r, 300); });
          navigate('auth-page-v2.html');
          return;
        }

        // Step 3: Validate the token
        setProgress(55, 'Verifying credentials…');
        var valid = await validateToken(token);

        if (valid) {
          setProgress(85, 'Session verified');
          await new Promise(function (r) { setTimeout(r, 200); });
          navigate('dashboard.html');
          return;
        }

        // Step 4: Try silent refresh
        setProgress(70, 'Refreshing session…');
        var refreshToken = localStorage.getItem('refreshToken') || token;
        var refreshed = await tryRefresh(refreshToken);

        if (refreshed) {
          setProgress(90, 'Session restored');
          await new Promise(function (r) { setTimeout(r, 200); });
          navigate('dashboard.html');
          return;
        }

        // Step 5: Token expired, require login
        setProgress(85, 'Session expired…');
        localStorage.removeItem('authToken');
        localStorage.removeItem('refreshToken');
        sessionStorage.removeItem('authToken');
        sessionStorage.removeItem('refreshToken');
        await new Promise(function (r) { setTimeout(r, 300); });
        navigate('auth-page-v2.html');
      }

      // Start after a small delay so the splash animation is visible
      setTimeout(boot, 600);
    })();
  </script>
</body>
</html>
