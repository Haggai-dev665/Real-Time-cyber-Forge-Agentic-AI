<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CyberForge — Installation</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../styles/cyberforge.css" />
<link rel="stylesheet" href="../styles/cf-auth.css" />
<link rel="stylesheet" href="../styles/installer.css" />
</head>
<body>
<div class="stage">
  <div class="window" id="win">
    <div class="bg-grid"></div>
    <div class="bg-scan"></div>
    <div class="wiz">
      <!-- LEFT RAIL -->
      <div class="rail-w">
        <div class="rw-top"><span class="wm-mark" id="railMark"></span><div><div class="wm-text">Cyber<span class="fg">Forge</span></div><div class="wm-sub">AI SECURITY</div></div></div>
        <div class="rw-ver">Setup Wizard · <b>v2.0.0</b> · 64-bit</div>
        <div class="steps" id="steps"></div>
        <div class="rail-foot"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg>Signed installer · SHA-256 verified</div>
      </div>

      <!-- RIGHT CONTENT -->
      <div class="content-w">
        <div class="cw-body">
          <div class="cw-illus" id="illus"></div>
          <div class="cw-copy" id="copy"></div>
        </div>
        <div class="cw-foot">
          <div class="pgz" id="pgz">Step 1 of 8</div>
          <div class="cw-nav">
            <button class="nav-back" id="back" disabled>Back</button>
            <a class="nav-next" id="next">Continue<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg></a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="../scripts/cf-forge.js"></script>
<script src="../scripts/installer.js"></script>
</body>
</html>
