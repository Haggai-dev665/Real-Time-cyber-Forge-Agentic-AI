<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CyberForge — AI Assistance</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../styles/cyberforge.css" />
<style>
.ai-grid{display:grid;grid-template-columns:1fr 320px;gap:14px;height:calc(100% - 56px);min-height:0}
.col{display:flex;flex-direction:column;gap:14px;min-height:0}
.chat-card{display:flex;flex-direction:column;min-height:0}
.chat{flex:1;overflow-y:auto;padding:20px 22px;display:flex;flex-direction:column;gap:18px}
.msg{display:flex;gap:12px;max-width:88%;animation:msgin .4s cubic-bezier(.2,.9,.25,1)}
@keyframes msgin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.msg .av{width:34px;height:34px;border-radius:10px;flex:none;display:grid;place-items:center;position:relative}
.msg.ai .av{color:var(--amber-2);border:1px solid rgba(245,166,35,.4);background:radial-gradient(circle at 50% 35%,#3a2a12,#140d04)}
.msg.ai .av svg{width:17px;height:17px}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg.user .av{color:var(--cyan);border:1px solid var(--border-2);background:linear-gradient(135deg,#1b3346,#10202e)}
.msg.user .av svg{width:16px;height:16px}
.bubble{padding:13px 16px;border-radius:13px;font-size:13px;line-height:1.65}
.msg.ai .bubble{background:var(--surface-2);border:1px solid var(--border);border-top-left-radius:4px;color:var(--text)}
.msg.user .bubble{background:linear-gradient(135deg,rgba(43,212,238,.16),rgba(43,212,238,.06));border:1px solid rgba(43,212,238,.25);border-top-right-radius:4px}
.bubble b{color:var(--amber-2);font-weight:600}
.bubble .codeline{font-family:var(--mono);font-size:11.5px;background:rgba(8,12,20,.7);border:1px solid var(--border);border-radius:7px;padding:9px 12px;margin:9px 0;color:var(--cyan);white-space:pre-wrap}
.bubble .toolchip{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10px;color:var(--amber-2);background:var(--amber-dim);border:1px solid rgba(245,166,35,.3);padding:3px 8px;border-radius:5px;margin:3px 4px 3px 0}
.bubble ul{margin:7px 0 2px 2px;list-style:none;display:flex;flex-direction:column;gap:6px}
.bubble li{display:flex;gap:9px;font-size:12.5px;color:var(--dim)}
.bubble li::before{content:"▸";color:var(--amber-2)}
.typing{display:flex;gap:4px;align-items:center;padding:4px 2px}
.typing i{width:7px;height:7px;border-radius:50%;background:var(--amber-2);animation:td 1.2s infinite}
.typing i:nth-child(2){animation-delay:.18s} .typing i:nth-child(3){animation-delay:.36s}
@keyframes td{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-3px)}}
.cursor-blink{display:inline-block;width:7px;height:14px;background:var(--amber-2);margin-left:2px;vertical-align:-2px;animation:blink 1s step-end infinite}

.suggest{display:flex;gap:9px;flex-wrap:wrap;padding:11px 16px;border-top:1px solid var(--border)}
.schip{font-size:11.5px;padding:8px 13px;border-radius:9px;cursor:pointer;border:1px solid var(--border-2);background:var(--surface-2);color:var(--dim);transition:.15s;display:flex;align-items:center;gap:7px}
.schip:hover{color:var(--text);border-color:rgba(245,166,35,.4);background:rgba(245,166,35,.05);transform:translateY(-1px)}
.schip svg{width:13px;height:13px;color:var(--amber-2)}
.inputbar{display:flex;align-items:center;gap:11px;padding:13px 16px;border-top:1px solid var(--border)}
.inputbar .field{flex:1;display:flex;align-items:center;gap:10px;height:46px;padding:0 16px;border-radius:12px;border:1px solid var(--border-2);background:rgba(8,12,20,.7);transition:.2s}
.inputbar .field:focus-within{border-color:rgba(245,166,35,.5);box-shadow:0 0 0 3px rgba(245,166,35,.12)}
.inputbar input{flex:1;background:none;border:none;outline:none;color:var(--text);font-size:13px;font-family:var(--sans)}
.inputbar input::placeholder{color:var(--faint)}
.send{width:46px;height:46px;border-radius:12px;flex:none;display:grid;place-items:center;cursor:pointer;color:#1a1206;border:1px solid rgba(245,166,35,.5);
  background:linear-gradient(180deg,#ffc15a,#f5a623);box-shadow:0 4px 14px -4px rgba(245,166,35,.6);transition:transform .15s}
.send:hover{transform:translateY(-1px)} .send:active{transform:scale(.93)} .send svg{width:18px;height:18px}

/* right rail */
.cap-row{display:flex;align-items:center;gap:11px;padding:11px 15px;border-bottom:1px solid var(--border);font-size:12.5px}
.cap-row .ci{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;flex:none;border:1px solid var(--border-2);background:var(--tile);color:var(--amber-2)}
.cap-row .ci svg{width:15px;height:15px}
.cap-row .cinfo{flex:1}
.cap-row .cn{font-weight:500}
.cap-row .cd{font-family:var(--mono);font-size:9px;color:var(--faint);margin-top:1px}
.cap-row .con{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 5px var(--green)}
.ctx{padding:11px 15px;border-bottom:1px solid var(--border);font-family:var(--mono);font-size:11px;display:flex;align-items:center;gap:9px}
.ctx .cx{width:7px;height:7px;border-radius:50%;background:var(--cyan);flex:none}
.ctx .cl{color:var(--dim);flex:1}
.ctx .cv{color:var(--faint)}
.ai-identity{padding:16px 15px;text-align:center}
.ai-orb{position:relative;width:72px;height:72px;margin:2px auto 11px;display:grid;place-items:center}
.ai-orb .ring{position:absolute;border-radius:50%;border:2px solid transparent}
.ai-orb .r1{inset:0;border-top-color:var(--amber);border-right-color:rgba(245,166,35,.3);animation:spin 2.8s linear infinite}
.ai-orb .r2{inset:11px;border-bottom-color:var(--cyan);border-left-color:rgba(43,212,238,.3);animation:spin 4s linear infinite reverse}
.ai-orb .orb{width:40px;height:40px;border-radius:12px;display:grid;place-items:center;color:var(--amber-2);background:radial-gradient(circle at 50% 35%,#4a3414,#140d04);border:1px solid rgba(245,166,35,.4)}
.ai-orb .orb svg{width:21px;height:21px;animation:bob 3.4s ease-in-out infinite}
.ai-identity .nm{font-size:14px;font-weight:600}
.ai-identity .sb{font-family:var(--mono);font-size:9.5px;color:var(--amber-2);opacity:.85;margin-top:2px}

/* markdown rendering inside AI bubbles */
.bubble .md-h{font-weight:600;color:var(--amber-2);margin:10px 0 4px;font-size:13px}
.bubble code{font-family:var(--mono);font-size:11.5px;background:rgba(8,12,20,.6);border:1px solid var(--border);border-radius:5px;padding:1px 5px;color:var(--cyan)}
.bubble a{color:var(--cyan)}
.bubble>div{margin:3px 0}
.bubble ul{margin:6px 0 4px}

/* connect-DeepSeek key banner */
.cf-keybar{margin-bottom:6px;padding:13px 15px;border-radius:12px;border:1px solid rgba(245,166,35,.3);
  background:linear-gradient(180deg,rgba(245,166,35,.10),rgba(245,166,35,.02));display:flex;flex-direction:column;gap:9px}
.cf-keybar .kb-t{font-size:12.5px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:8px}
.cf-keybar .kb-t svg{width:15px;height:15px;color:var(--amber-2)}
.cf-keybar .kb-d{font-size:11px;color:var(--dim);line-height:1.55}
.cf-keybar .kb-d a{color:var(--cyan)}
.cf-keybar .kb-row{display:flex;gap:8px}
.cf-keybar input{flex:1;height:38px;padding:0 12px;border-radius:9px;border:1px solid var(--border-2);background:rgba(8,12,20,.7);color:var(--text);font-family:var(--mono);font-size:11.5px;outline:none}
.cf-keybar input:focus{border-color:rgba(245,166,35,.5)}
.cf-keybar button{height:38px;padding:0 16px;border-radius:9px;border:1px solid rgba(245,166,35,.5);background:linear-gradient(180deg,#ffc15a,#f5a623);color:#1a1206;font-weight:600;font-size:12px;cursor:pointer}
.cf-keybar button:hover{filter:brightness(1.05)} .cf-keybar button:disabled{opacity:.5;cursor:default}
.cf-keybar .kb-note{font-size:9.5px;color:var(--faint);font-family:var(--mono)}

/* FIX: this icon has a viewBox but no width/height, so it rendered at a huge
   intrinsic size and overflowed up into the chat. Constrain it. */
.inputbar .field>svg{width:18px;height:18px;flex:none;color:var(--faint)}

/* nicer AI bubble + staggered "composing" reveal of each answer block */
.msg.ai .bubble{box-shadow:0 3px 14px -8px rgba(0,0,0,.55)}
.bubble.rendering>*{opacity:0;transform:translateY(6px);animation:rvIn .36s cubic-bezier(.2,.9,.25,1) forwards}
@keyframes rvIn{to{opacity:1;transform:none}}
.send{transition:transform .15s, box-shadow .2s} .send:hover{box-shadow:0 6px 20px -5px rgba(245,166,35,.7)}
.schip{transition:transform .15s,border-color .2s,background .2s,color .2s}

/* ---- thinking indicator (animated line next to the icon) ---- */
@keyframes blink{50%{opacity:0}}
.think{display:flex;align-items:center;gap:10px;padding:4px 2px}
.think-line{position:relative;width:74px;height:3px;border-radius:3px;overflow:hidden;background:rgba(245,166,35,.13)}
.think-line::after{content:"";position:absolute;top:0;bottom:0;left:0;width:38%;border-radius:3px;background:linear-gradient(90deg,transparent,var(--amber-2),transparent);animation:thinslide 1.05s ease-in-out infinite}
@keyframes thinslide{0%{transform:translateX(-110%)}100%{transform:translateX(280%)}}
.think-txt{font-family:var(--mono);font-size:11px;color:var(--amber-2);opacity:.92;letter-spacing:.3px}
/* neural-activity equalizer pulse (matches the floating agent) */
.think .eq{display:inline-flex;align-items:flex-end;gap:2.5px;height:15px;flex:none}
.think .eq i{width:3px;height:4px;border-radius:2px;background:var(--amber-2);animation:eqp 1s ease-in-out infinite}
.think .eq i:nth-child(2){animation-delay:.12s;background:var(--cyan)}
.think .eq i:nth-child(3){animation-delay:.24s}
.think .eq i:nth-child(4){animation-delay:.36s;background:var(--cyan)}
.think .eq i:nth-child(5){animation-delay:.48s}
@keyframes eqp{0%,100%{height:4px;opacity:.5}50%{height:15px;opacity:1}}
/* threat action buttons under a flagged AI answer */
.threat-actions{margin-top:12px;padding:12px;border-radius:10px;border:1px solid rgba(244,73,94,.3);background:rgba(244,73,94,.07)}
.ta-head{font-size:12px;color:#ff9aa6;display:flex;align-items:center;gap:8px;margin-bottom:10px}
.ta-head b{color:#ff7185}
.ta-btns{display:flex;gap:9px;flex-wrap:wrap}
.ta-btn{display:flex;align-items:center;gap:7px;height:34px;padding:0 14px;border-radius:8px;font-family:var(--sans);font-size:12.5px;font-weight:600;cursor:pointer;border:1px solid;transition:.15s}
.ta-btn svg{width:14px;height:14px}
.ta-btn.block{color:#ff7185;border-color:rgba(244,73,94,.45);background:rgba(244,73,94,.12)}
.ta-btn.block:hover{background:rgba(244,73,94,.22)}
.ta-btn.protect{color:var(--cyan);border-color:rgba(43,212,238,.4);background:var(--cyan-dim)}
.ta-btn.protect:hover{background:rgba(43,212,238,.22)}
.ta-btn.done{opacity:.7;pointer-events:none}
.ta-note{font-family:var(--mono);font-size:10px;color:var(--dim);margin-top:9px;line-height:1.5}
/* ---- streaming typewriter ---- */
.typed{white-space:pre-wrap;word-break:break-word}
.tcursor{display:inline-block;width:7px;height:15px;background:var(--amber-2);margin-left:1px;vertical-align:-2px;border-radius:1px;animation:blink 1s step-end infinite}
.mem-chip{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10px;color:var(--cyan);background:var(--cyan-dim);border:1px solid rgba(43,212,238,.3);padding:3px 9px;border-radius:20px;margin-bottom:9px}
.mem-chip svg{width:11px;height:11px}
/* ---- conversations (chat history) ---- */
.conv-card{flex:1;display:flex;flex-direction:column;min-height:0}
.conv-new{font-family:var(--mono);font-size:10px;color:var(--amber-2);background:var(--amber-dim);border:1px solid rgba(245,166,35,.3);border-radius:6px;padding:4px 10px;cursor:pointer;display:inline-flex;align-items:center;gap:5px}
.conv-new:hover{background:rgba(245,166,35,.2)}
.chatlist{overflow-y:auto;padding:6px;display:flex;flex-direction:column;gap:4px;min-height:0}
.chatrow{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:8px;cursor:pointer;border:1px solid transparent;color:var(--dim);transition:background .15s,color .15s,border-color .15s}
.chatrow:hover{background:rgba(130,160,200,.05);color:var(--text)}
.chatrow.active{background:linear-gradient(90deg,rgba(245,166,35,.13),transparent);border-color:rgba(245,166,35,.25);color:var(--amber-2)}
.chatrow>svg{flex:none;opacity:.7}
.chatrow .ct{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:12.5px}
.chatrow .del{width:24px;height:24px;border-radius:6px;display:grid;place-items:center;color:var(--faint);flex:none;border:1px solid transparent}
.chatrow .del:hover{color:var(--red);background:rgba(244,73,94,.12);border-color:rgba(244,73,94,.25)}
</style>
</head>
<body>
<div class="stage">
  <div class="window" data-screen-label="AI Assistance" id="win">
    <div class="topbar" id="topbar"></div>
    <div class="body">
      <aside class="sidebar" id="sidebar"></aside>
      <main class="main">
        <div class="main-head">
          <div class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v3M12 18v3M3 12h3M18 12h3M5.6 5.6l2.1 2.1M16.3 16.3l2.1 2.1M5.6 18.4l2.1-2.1M16.3 7.7l2.1-2.1"/><circle cx="12" cy="12" r="3"/></svg></div>
          <h1>AI Assistance</h1>
          <div class="head-right">
            <span class="live-ind"><span class="dot"></span><span id="liveState">Online</span></span>
            <span id="modelBadge">DeepSeek</span>
            <button class="btn-refresh" id="exportPdfBtn" title="Generate a PDF report of this conversation"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8Z"/><path d="M14 3v5h5M12 18v-6M9 15l3 3 3-3"/></svg>PDF Report</button>
            <button class="btn-refresh" id="newChatBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>New Chat</button>
          </div>
        </div>

        <div class="ai-grid">
          <div class="card chat-card">
            <div class="panel-head"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2Z"/></svg>Conversation<span class="right"><span class="badge-live"><span class="dot"></span>AGENTIC</span></span></div>
            <div class="chat" id="chat"></div>
            <div class="suggest" id="suggest"></div>
            <div class="inputbar">
              <div class="field"><svg viewBox="0 0 24 24" fill="none" stroke="var(--faint)" stroke-width="2"><path d="M12 3a4 4 0 0 0-4 4 4 4 0 0 0-1 7 4 4 0 0 0 5 4 4 4 0 0 0 5-4 4 4 0 0 0-1-7 4 4 0 0 0-4-4Z"/></svg><input id="msgInput" placeholder="Ask CyberForge anything — threats, hosts, playbooks…" /></div>
              <div class="send" id="sendBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 11 13M22 2l-7 20-4-9-9-4Z"/></svg></div>
            </div>
          </div>

          <div class="col">
            <div class="card ai-identity">
              <div class="ai-orb"><span class="ring r1"></span><span class="ring r2"></span><span class="orb"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="7" width="16" height="12" rx="3"/><path d="M12 3v4M8 12h.01M16 12h.01M9 16h6"/></svg></span></div>
              <div class="nm">CyberForge Assistant</div>
              <div class="sb">grounded in live telemetry</div>
            </div>
            <div class="card conv-card">
              <div class="panel-head"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2Z"/></svg>Conversations<span class="right"><button class="conv-new" id="convNew"><svg viewBox="0 0 24 24" width="11" height="11" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>New</button></span></div>
              <div class="chatlist" id="chatList"></div>
            </div>
            <div class="card" style="display:flex;flex-direction:column;min-height:0">
              <div class="panel-head"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>Session Context</div>
              <div style="overflow-y:auto">
                <div class="ctx"><span class="cx"></span><span class="cl">Model</span><span class="cv" id="ctxModel">DeepSeek</span></div>
                <div class="ctx"><span class="cx"></span><span class="cl">Inference</span><span class="cv">HF Providers</span></div>
                <div class="ctx"><span class="cx"></span><span class="cl">DeepSeek key</span><span class="cv" id="ctxKey">checking…</span></div>
                <div class="ctx"><span class="cx"></span><span class="cl">Backend</span><span class="cv" id="ctxBackend">—</span></div>
                <div class="ctx"><span class="cx"></span><span class="cl">Active threats</span><span class="cv" id="ctxThreats">—</span></div>
                <div class="ctx"><span class="cx"></span><span class="cl">Browsers</span><span class="cv" id="ctxBrowsers">—</span></div>
              </div>
            </div>
          </div>
        </div>
      </main>
      <div class="agent-fab" title="CyberForge Agent"><span class="fab-ping"></span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="7" width="16" height="12" rx="3"/><path d="M12 3v4M8 12h.01M16 12h.01M9 16h6"/></svg></div>
    </div>
    <div class="statusbar" id="statusbar"></div>
  </div>
</div>

<script src="../scripts/cyberforge-shared.js"></script>
<script src="../scripts/cf-realtime.js"></script>
<script src="../scripts/cf-live.js"></script>
<script src="../scripts/cf-header.js"></script>
<script src="../scripts/cf-sidebar.js"></script>
<script src="../scripts/cf-footer.js"></script>
<script src="../scripts/cf-report.js"></script>
<script>
buildHeader({status:'ASSISTANT',cta:'New Chat'});
buildSidebar('assistant');
buildFooter({items:[{txt:'DeepSeek',cls:'sb-amber'},{txt:'HF Providers',cls:'sb-cyan'},{txt:'4 tools',cls:'sb-cyan'},{txt:'Online',cls:'sb-green',spin:true}]});
fitWindow('win');

const chat=document.getElementById('chat');
const botAv='<span class="av"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="7" width="16" height="12" rx="3"/><path d="M12 3v4M8 12h.01M16 12h.01M9 16h6"/></svg></span>';
const userAv='<span class="av"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="9" r="3"/><path d="M5 20a7 7 0 0 1 14 0"/></svg></span>';

function escHtml(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function cfInvoke(cmd,args){ try{ if(window.CF&&CF.invoke) return CF.invoke(cmd,args||{}); }catch(e){} return Promise.reject(new Error('no tauri')); }

function addUser(text){
  const m=document.createElement('div');m.className='msg user';
  m.innerHTML=userAv+'<div class="bubble">'+text+'</div>';chat.appendChild(m);chat.scrollTop=chat.scrollHeight;
}
function addBot(html){
  const m=document.createElement('div');m.className='msg ai';
  const b=document.createElement('div');b.className='bubble';
  m.innerHTML=botAv;m.appendChild(b);b.innerHTML=html;
  chat.appendChild(m);chat.scrollTop=chat.scrollHeight;
  return b;
}

/* lightweight, safe markdown -> HTML (escape first, then format) */
function mdToHtml(raw){
  const lines=escHtml(raw).split('\n'); const out=[]; let inList=false,inCode=false,code=[];
  const inline=t=>t.replace(/`([^`]+)`/g,'<code>$1</code>').replace(/\*\*([^*]+)\*\*/g,'<b>$1</b>').replace(/\[([^\]]+)\]\((https?:\/\/[^)\s]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
  const closeList=()=>{ if(inList){ out.push('</ul>'); inList=false; } };
  for(const ln of lines){
    if(/^```/.test(ln)){ if(inCode){ out.push('<div class="codeline">'+code.join('\n')+'</div>'); code=[]; inCode=false; } else { closeList(); inCode=true; } continue; }
    if(inCode){ code.push(ln); continue; }
    const h=ln.match(/^#{1,6}\s+(.+)$/); if(h){ closeList(); out.push('<div class="md-h">'+inline(h[1])+'</div>'); continue; }
    const li=ln.match(/^\s*(?:[-*]|\d+\.)\s+(.+)$/); if(li){ if(!inList){ out.push('<ul>'); inList=true; } out.push('<li>'+inline(li[1])+'</li>'); continue; }
    closeList();
    if(ln.trim()==='') out.push('<br>'); else out.push('<div>'+inline(ln)+'</div>');
  }
  if(inCode) out.push('<div class="codeline">'+code.join('\n')+'</div>');
  closeList(); return out.join('');
}

/* ============================ CHAT STORE (local, persisted) ============================ */
var CHATS_KEY='cf_ai_chats', CUR_KEY='cf_ai_cur';
function loadChats(){ try{ return JSON.parse(localStorage.getItem(CHATS_KEY)||'[]'); }catch(e){ return []; } }
var chats=loadChats(), currentId=localStorage.getItem(CUR_KEY)||'';
function persist(){ try{ localStorage.setItem(CHATS_KEY,JSON.stringify(chats)); localStorage.setItem(CUR_KEY,currentId); }catch(e){} }
function curChat(){ for(var i=0;i<chats.length;i++) if(chats[i].id===currentId) return chats[i]; return null; }
function newChat(){ finishTypingIfAny(); var id='c'+Date.now().toString(36);
  chats.unshift({id:id,title:'',messages:[],at:Date.now()}); currentId=id; persist();
  renderChatList(); chat.innerHTML=''; seed(); updateSuggest(); var i=document.getElementById('msgInput'); if(i)i.focus(); }
function selectChat(id){ finishTypingIfAny(); currentId=id; persist(); renderChatList(); renderMessages(); updateSuggest(); }
function deleteChat(id){ finishTypingIfAny(); chats=chats.filter(function(c){return c.id!==id;});
  if(currentId===id) currentId=chats[0]?chats[0].id:'';
  if(!chats.length){ persist(); newChat(); return; }
  persist(); renderChatList(); renderMessages(); updateSuggest(); }
function pushMsg(role,text){ var c=curChat(); if(!c)return; c.messages.push({role:role,text:text,at:Date.now()});
  if(role==='user'&&!c.title) c.title=text.slice(0,42); c.at=Date.now(); persist(); renderChatList(); }
function renderChatList(){ var el=document.getElementById('chatList'); if(!el)return;
  if(!chats.length){ el.innerHTML='<div style="padding:16px;text-align:center;color:var(--faint);font-family:var(--mono);font-size:10.5px">No conversations yet</div>'; return; }
  el.innerHTML=chats.map(function(c){ var on=c.id===currentId;
    return '<div class="chatrow'+(on?' active':'')+'" data-id="'+c.id+'">'+
      '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2Z"/></svg>'+
      '<span class="ct">'+escHtml(c.title||'New chat')+'</span>'+
      '<span class="del" data-del="'+c.id+'" title="Delete chat"><svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg></span></div>'; }).join('');
  el.querySelectorAll('.chatrow').forEach(function(r){ r.addEventListener('click',function(e){ if(e.target.closest('.del'))return; selectChat(r.dataset.id); }); });
  el.querySelectorAll('.del').forEach(function(d){ d.addEventListener('click',function(e){ e.stopPropagation(); deleteChat(d.dataset.del); }); });
}
function renderMessages(){ chat.innerHTML=''; var c=curChat();
  if(!c||!c.messages.length){ seed(); return; }
  c.messages.forEach(function(m){ if(m.role==='user') addUser(escHtml(m.text)); else { var b=addBot(''); b.innerHTML=mdToHtml(m.text); } });
  chat.scrollTop=chat.scrollHeight; }
function updateSuggest(){ var s=document.getElementById('suggest'); if(!s)return; var c=curChat(); s.style.display=(c&&c.messages.length)?'none':'flex'; }

/* ============================ MEMORY GROUNDING ============================ */
/* Pull the most relevant memories saved across the app (OTX intel, scans,
   browser intelligence, etc. — the same store the Memory page shows) and use
   them as grounding context for the model. memory_search => Tauri camelCases
   `top_k` to `topK`. */
function gatherMemory(q){
  // Pull BOTH semantic matches (relevance) AND recent memory (so listing /
  // aggregation questions like "what scans have run?" work even when the wording
  // doesn't lexically match the stored text). Merge, newest-aware, deduped.
  var pSearch=cfInvoke('memory_search',{query:q, topK:8})
    .then(function(r){ return (r&&r.data&&r.data.results)||[]; }).catch(function(){ return []; });
  var pList=cfInvoke('memory_list',{limit:80})
    .then(function(r){ return (r&&r.data)||{}; }).catch(function(){ return {}; });
  return Promise.all([pSearch,pList]).then(function(a){
    var sem=a[0]||[], listd=a[1]||{}, recent=listd.memories||[];
    var seen={}, merged=[];
    function add(m){ if(!m||!m.text) return; var k=String(m.text).slice(0,120); if(seen[k]) return; seen[k]=1;
      merged.push({text:m.text, category:m.category||m.kind||'memory', kind:m.kind, ts:m.ts, url:m.url, risk:m.risk}); }
    sem.forEach(add);           // most relevant first
    recent.forEach(add);        // then fill with recent activity (scans, reports, analyses)
    var items=merged.slice(0,20);
    items._counts={ total:(listd.total!=null?listd.total:merged.length), episodic:listd.episodic||0, semantic:listd.semantic||0, procedural:listd.procedural||0 };
    return items;
  });
}
function buildAugmented(q, mems){
  if(!mems||!mems.length) return q;
  var c=mems._counts||{};
  var ctx=mems.map(function(m,i){ return (i+1)+'. ['+m.category+'] '+m.text; }).join('\n');
  var overview='Memory overview: '+(c.total||mems.length)+' memories — '+(c.episodic||0)+' scans/analyses, '+(c.semantic||0)+' threat-intel, '+(c.procedural||0)+' reports/digests.';
  return 'You are the CyberForge security assistant. The CONTEXT below is the user\'s local CyberForge memory — every URL/IOC scan, threat-intel pulse, report and analysis saved across the app (scan entries begin with "Scanned …"). Ground your answer in it. When the user asks WHAT scans / reports / analyses / activity exist, LIST the relevant items you see in the context (do not claim there are none if scan entries are present). Cite specifics — hosts, verdicts, risk scores, countries, malware, techniques. If the context is genuinely irrelevant, answer from your own knowledge. '+overview+'\n\nCONTEXT:\n'+ctx+'\n\nQUESTION: '+q;
}
function memChipHTML(n){ return '<div class="mem-chip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3a4 4 0 0 0-4 4 4 4 0 0 0-1 7 4 4 0 0 0 5 4 4 4 0 0 0 5-4 4 4 0 0 0-1-7 4 4 0 0 0-4-4Z"/></svg>grounded in '+n+' memor'+(n===1?'y':'ies')+'</div>'; }

/* ============================ THINKING + TYPEWRITER ============================ */
function thinkingHTML(){ return '<div class="think"><span class="eq"><i></i><i></i><i></i><i></i><i></i></span><span class="think-line"></span><span class="think-txt">Thinking…</span></div>'; }
function rotateThinking(b){ var msgs=['Reading memory…','Connecting signals…','Reasoning…','Composing reply…']; var i=0;
  var t=b.querySelector('.think-txt'); if(t)t.textContent=msgs[0];
  var iv=setInterval(function(){ i=(i+1)%msgs.length; var el=b.querySelector('.think-txt'); if(el)el.textContent=msgs[i]; },1100);
  return function(){ clearInterval(iv); }; }

var typingIv=null, typingState=null;
function typeInto(b, full, mems, fallback, onDone){
  b.innerHTML='<span class="typed"></span><span class="tcursor"></span>';
  var span=b.querySelector('.typed');
  var i=0, n=full.length, step=Math.max(1, Math.round(n/240));
  typingState={b:b, full:full, mems:mems, fallback:fallback, onDone:onDone};
  typingIv=setInterval(function(){
    i=Math.min(n, i+step+(Math.random()<0.3?1:0));
    span.textContent=full.slice(0,i);
    chat.scrollTop=chat.scrollHeight;
    if(i>=n) finishTyping();
  }, 14);
}
/* ---- threat detection from grounded memory -> Block / Protect actions ---- */
function hostOf(u){ try{ var h=(String(u).split('://')[1]||String(u)).split('/')[0]; return h.split('?')[0].replace(/^www\./,''); }catch(e){ return ''; } }
function hostFromText(t){ var m=String(t||'').match(/\b((?:[a-z0-9-]+\.)+[a-z]{2,})\b/i); return m?m[1].replace(/^www\./,''):''; }
function threatCandidate(mems){
  if(!mems||!mems.length) return null; var best=null;
  mems.forEach(function(m){
    var risk=(m.risk!=null)?+m.risk:0;
    var mal=/phishing|malicious|malware|ransomware|botnet|trojan|c2|spyware|dga/i.test(m.text||'');
    var host=m.url?hostOf(m.url):(mal?hostFromText(m.text):'');
    if(!host) return;
    var sev=Math.max(risk, mal?65:0);
    if(sev>=50 && (!best || sev>best.risk)) best={host:host, risk:sev};
  });
  return best;
}
function appendThreatActions(bubble, threat){
  // Shared Block / Protect / Allow actions (cyberforge-shared.js) so the
  // assistant, floating agent and agent core all behave identically.
  if(window.CF&&CF.threatActions){ bubble.appendChild(CF.threatActions({host:threat.host, risk:threat.risk})); chat.scrollTop=chat.scrollHeight; }
}

function finishTyping(){
  if(!typingIv) return; clearInterval(typingIv); typingIv=null;
  var s=typingState; typingState=null;
  var html=(s.mems&&s.mems.length?memChipHTML(s.mems.length):'')+mdToHtml(s.full);
  if(s.fallback) html+='<div class="kb-note" style="margin-top:9px">⚠ DeepSeek not connected — answered from the built-in knowledge base. Connect your HF token for full DeepSeek reasoning.</div>';
  s.b.innerHTML=html;
  var threat=threatCandidate(s.mems); if(threat) appendThreatActions(s.b, threat);
  chat.scrollTop=chat.scrollHeight;
  busy=false;
  if(s.onDone) s.onDone();
}
function finishTypingIfAny(){ if(typingIv) finishTyping(); }

/* ============================ ASK ============================ */
const modelBadge=document.getElementById('modelBadge'), ctxModel=document.getElementById('ctxModel'), ctxKey=document.getElementById('ctxKey');
let busy=false;
function updateModel(model){ if(!model)return; var nice=/deepseek/i.test(model)?'DeepSeek':(/cyberforge-kb/i.test(model)?'CyberForge KB':String(model).split('/').pop());
  if(modelBadge)modelBadge.textContent=nice; if(ctxModel)ctxModel.textContent=nice; }

async function ask(q){
  if(busy) return; busy=true;
  finishTypingIfAny();
  addUser(escHtml(q)); pushMsg('user',q); updateSuggest();
  const b=addBot(thinkingHTML());
  const stopThink=rotateThinking(b);
  try{
    const mems=await gatherMemory(q);
    const body=await CF.ml.chat(buildAugmented(q,mems), 700);
    const d=(body&&body.data)||body||{};
    let txt=d.response||d.answer||d.text||d.output||d.reply||body.response||body.message||'';
    const model=d.model||body.model||''; const fallback=d.fallback||body.fallback;
    if(!txt) txt='I couldn\'t generate a response just now. If you haven\'t connected DeepSeek yet, paste your Hugging Face token above to enable it.';
    stopThink();
    typeInto(b, txt, mems, fallback, function(){ pushMsg('ai',txt); updateModel(model); });
  }catch(e){
    stopThink();
    const offline=/no tauri|tauri-unavailable/i.test(String((e&&e.message)||e));
    b.innerHTML= offline
      ? 'The AI service is only available inside the desktop app (Tauri bridge not found).'
      : 'I hit an error reaching the model. If DeepSeek isn\'t connected, paste your Hugging Face token above; otherwise retry shortly.';
    busy=false;
  }
}
const input=document.getElementById('msgInput'), send=document.getElementById('sendBtn');
function submit(){ const v=input.value.trim(); if(!v)return; input.value=''; ask(v); }
send.addEventListener('click',submit);
input.addEventListener('keydown',e=>{ if(e.key==='Enter') submit(); });
var nc=document.getElementById('newChatBtn'); if(nc) nc.addEventListener('click', newChat);
var cn=document.getElementById('convNew'); if(cn) cn.addEventListener('click', newChat);

/* ---- suggestions ---- */
const suggestions=[
  ['What does my recent threat intel say about the most-targeted countries?','<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a14 14 0 0 1 0 18"/></svg>'],
  ['Summarise the malware families and TTPs in my memory','<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2 4 5v6c0 5 3.5 8 8 9 4.5-1 8-4 8-9V5l-8-3Z"/></svg>'],
  ['How should I respond to a ransomware infection?','<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="m6 15 4-5 3 3 5-7"/></svg>'],
  ['Map a phishing attack to MITRE ATT&CK','<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8Z"/><path d="M14 3v5h5"/></svg>']
];
const suggestEl=document.getElementById('suggest');
suggestEl.innerHTML=suggestions.map(s=>'<div class="schip" data-q="'+s[0].replace(/"/g,'&quot;')+'">'+s[1]+s[0]+'</div>').join('');
suggestEl.querySelectorAll('.schip').forEach(c=>c.addEventListener('click',()=>ask(c.dataset.q)));

/* ---- Generate a branded PDF report of the CURRENT conversation ---- */
function ctxVal(id){ var el=document.getElementById(id); return el?el.textContent.trim():'—'; }
function exportConversationPDF(){
  if(!window.CFReport){ if(CF.toast)CF.toast('Report module not loaded','error'); return; }
  var c=curChat(); var msgs=(c&&c.messages)||[];
  var qa=[]; var pendingQ=null;
  msgs.forEach(function(m){ if(m.role==='user'){ if(pendingQ!=null) qa.push([pendingQ,'(no answer)']); pendingQ=m.text; }
    else if(m.role==='ai'){ qa.push([pendingQ!=null?pendingQ:'(context)', m.text]); pendingQ=null; } });
  if(pendingQ!=null) qa.push([pendingQ,'(awaiting answer)']);
  if(!qa.length){ if(CF.toast)CF.toast('Ask the assistant something first','warn'); return; }
  var model=ctxVal('ctxModel');
  var intro='This report captures an advisory session with the CyberForge AI Assistant, grounded in the system’s local security memory (threat-intel, scans, browser intelligence). The questions and answers below are reproduced verbatim and are intended to support — not replace — the judgement of a qualified analyst.';
  var disclaimer='AI-generated guidance may contain inaccuracies and should be validated before action. Treat indicators and remediation steps as advisory. The session is stored locally for the signed-in user only.';
  CFReport.export({
    title:'AI Assistant Advisory Report', subtitle:'Conversational threat-analysis session',
    id:'AIR-'+String(Date.now()).slice(-6), classification:'CONFIDENTIAL · TLP:AMBER',
    sections:[
      {h:'Overview',type:'p',body:intro},
      {h:'Session Context',type:'kv',body:[['Assistant model',model],['Backend status',ctxVal('ctxBackend')],['Active threats',ctxVal('ctxThreats')],['Browsers detected',ctxVal('ctxBrowsers')],['Questions in session',String(qa.length)]]},
      {h:'Advisory Transcript',type:'qa',body:qa},
      {h:'Important Notice',type:'p',body:disclaimer}
    ]
  }).then(function(){ if(CF.toast)CF.toast('Report ready — choose “Save as PDF” in the print dialog','ok'); });
}
var epb=document.getElementById('exportPdfBtn'); if(epb) epb.addEventListener('click',exportConversationPDF);

/* ---- Connect DeepSeek: paste the HF token once (stored in the OS keychain) ---- */
function showKeyBar(){
  if(document.getElementById('cfKeyBar')) return;
  var bar=document.createElement('div'); bar.className='cf-keybar'; bar.id='cfKeyBar';
  bar.innerHTML=
    '<div class="kb-t"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg>Connect DeepSeek</div>'+
    '<div class="kb-d">Paste a Hugging Face access token to enable real DeepSeek reasoning — stored securely in your OS keychain, never in the app. Create one at <a href="https://huggingface.co/settings/tokens" target="_blank" rel="noopener">huggingface.co/settings/tokens</a> (needs the Inference permission).</div>'+
    '<div class="kb-row"><input id="hfKeyInput" type="password" placeholder="hf_..." autocomplete="off" spellcheck="false"/><button id="hfKeySave">Connect</button></div>'+
    '<div class="kb-note">Or set the HF_TOKEN environment variable before launching.</div>';
  chat.parentElement.insertBefore(bar, chat);
  var inp=bar.querySelector('#hfKeyInput'), btn=bar.querySelector('#hfKeySave');
  function save(){
    var v=(inp.value||'').trim(); if(!v) return;
    btn.disabled=true; btn.textContent='Connecting…';
    CF.invoke('set_hf_token',{token:v}).then(function(){
      bar.remove(); if(ctxKey)ctxKey.textContent='connected';
      addBot('✅ DeepSeek connected. Answers now come from the DeepSeek model, grounded in your CyberForge memory.');
    }).catch(function(e){
      btn.disabled=false; btn.textContent='Connect';
      addBot('Couldn\'t save the token: '+escHtml(String((e&&e.message)||e))+'. You can also set the HF_TOKEN environment variable instead.');
    });
  }
  btn.addEventListener('click',save);
  inp.addEventListener('keydown',function(e){ if(e.key==='Enter') save(); });
}
CF.invoke('hf_token_status').then(function(r){
  var ok=r&&r.configured;
  if(ctxKey)ctxKey.textContent= ok?'connected':'not set';
  if(!ok) showKeyBar();
}).catch(function(){ if(ctxKey)ctxKey.textContent='—'; });

/* ---- live session context from cf-telemetry ---- */
(function(){
  function apply(p){ if(!p)return;
    var st=(p.status&&p.status.data)||null;
    if(st){ var be=document.getElementById('ctxBackend'); if(be)be.textContent=st.backendOk?'online':'offline';
      var th=document.getElementById('ctxThreats'); if(th)th.textContent=(st.threatCount!=null?st.threatCount:'—');
      var ls=document.getElementById('liveState'); if(ls)ls.textContent=st.backendOk?'Online':'Offline'; }
    var br=(p.browsers&&p.browsers.data)||null;
    if(br){ var b=document.getElementById('ctxBrowsers'); if(b)b.textContent=(br.installed||0)+' detected'; }
  }
  try{ var T=window.__TAURI__||(window.parent&&window.parent.__TAURI__);
    if(T&&T.event&&T.event.listen) T.event.listen('cf-telemetry', function(e){ apply(e.payload); });
  }catch(e){}
})();

function seed(){
  addBot('Hi — I\'m the <b>CyberForge Assistant</b>. I read your local CyberForge <b>memory</b> (threat-intel, scans, browser intelligence saved across the app) to ground every answer. Ask me about threats, malware, MITRE ATT&CK, IOCs, or incident-response playbooks.');
}

/* ============================ INIT ============================ */
renderChatList();
if(!chats.length){ newChat(); }
else { if(!curChat()) currentId=chats[0].id; renderChatList(); renderMessages(); updateSuggest(); }
</script>
