<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CyberForge — Browser Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="cyberforge.css" />
<style>
.bi-grid{display:grid;grid-template-columns:1fr 330px;gap:14px;height:calc(100% - 56px);min-height:0}
.col{display:flex;flex-direction:column;gap:14px;min-height:0}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:14px}
.kpi{padding:13px 15px}
.kpi .kl{font-family:var(--mono);font-size:9px;letter-spacing:1.5px;color:var(--faint);text-transform:uppercase}
.kpi .kv{font-family:var(--mono);font-size:24px;font-weight:600;margin-top:6px}
.kpi .kd{font-size:10px;color:var(--faint);margin-top:2px}

.dgraph{height:188px;position:relative;overflow:hidden;border-radius:0 0 9px 9px;background:radial-gradient(600px 300px at 50% 30%,rgba(43,212,238,.05),transparent 60%),#070b13}
.dgraph canvas{position:absolute;inset:0;width:100%;height:100%;display:block}

.http{overflow-y:auto;min-height:0;font-family:var(--mono);font-size:11px}
.hhead{display:flex;gap:10px;padding:7px 15px;border-bottom:1px solid var(--border);font-size:9px;letter-spacing:1px;color:var(--faint);text-transform:uppercase;position:sticky;top:0;background:var(--surface-solid)}
.hr{display:flex;gap:10px;padding:7px 15px;border-bottom:1px solid var(--border);align-items:center;animation:hin .35s ease}
@keyframes hin{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:none}}
.hr:hover{background:rgba(130,160,200,.05);cursor:pointer}
.hr.open{background:rgba(245,166,35,.06)}
.hr-det{font-family:var(--mono);font-size:10px;color:var(--faint);padding:0 15px;max-height:0;overflow:hidden;transition:max-height .3s ease,padding .3s ease;border-bottom:1px solid var(--border)}
.hr-det.open{max-height:180px;padding:10px 15px}
.hr-det .dk{color:var(--cyan)} .hr-det .dl{display:flex;gap:8px;padding:2px 0}
.hr-det .timing{height:5px;border-radius:3px;background:rgba(130,160,200,.12);margin:8px 0 4px;display:flex;overflow:hidden}
.hr-det .timing i{height:100%}
.hm{width:46px;flex:none;font-weight:600}
.hm.get{color:var(--cyan)} .hm.post{color:var(--amber-2)} .hm.put{color:var(--blue)} .hm.del{color:var(--red)}
.hu{flex:1;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hs{width:34px;flex:none;text-align:right} .hs.ok{color:var(--green)} .hs.warn{color:var(--amber-2)} .hs.err{color:var(--red)}
.hsz{width:48px;flex:none;text-align:right;color:var(--faint)}
.ht{width:54px;flex:none;text-align:right;color:var(--faint);font-size:9.5px}

.sess{padding:4px 0;overflow-y:auto}
.sr{display:flex;align-items:center;gap:11px;padding:11px 15px;border-bottom:1px solid var(--border)}
.sr .sav{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;flex:none;border:1px solid var(--border-2);background:var(--tile);color:var(--cyan)}
.sr .sav svg{width:15px;height:15px}
.sr .sinfo{flex:1;min-width:0}
.sr .su{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sr .sm{font-family:var(--mono);font-size:9px;color:var(--faint);margin-top:2px}
.sr .sdot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 5px var(--green);flex:none}

.intc{padding:11px 13px;border-bottom:1px solid var(--border)}
.intc .ih{display:flex;align-items:center;gap:9px;margin-bottom:9px}
.intc .ih .hm{width:auto}
.intc .iurl{font-family:var(--mono);font-size:10.5px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.intc .iact{display:flex;gap:8px}
.ibtn{flex:1;height:28px;border-radius:7px;font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.5px;cursor:pointer;border:1px solid var(--border-2);background:var(--surface-2);color:var(--dim);transition:.15s;display:flex;align-items:center;justify-content:center;gap:6px}
.ibtn.fwd{color:var(--green);border-color:rgba(67,224,138,.3);background:rgba(67,224,138,.08)}
.ibtn.drop{color:var(--red);border-color:rgba(244,73,94,.3);background:rgba(244,73,94,.08)}
.ibtn:hover{filter:brightness(1.25)} .ibtn:active{transform:scale(.96)}
.alert-row{display:flex;align-items:center;gap:10px;padding:10px 15px;border-bottom:1px solid var(--border);font-size:12px}
.alert-row .ai{width:14px;height:14px;flex:none}
</style>
</head>
<body>
<div class="stage">
  <div class="window" data-screen-label="Browser Intelligence" id="win">
    <div class="topbar" id="topbar"></div>
    <div class="body">
      <aside class="sidebar" id="sidebar"></aside>
      <main class="main">
        <div class="main-head">
          <div class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a14 14 0 0 1 0 18"/></svg></div>
          <h1>Browser Intelligence</h1>
          <div class="head-right">
            <span class="live-ind"><span class="dot"></span>Monitoring</span>
            <span id="rpm">1,240 req/min</span>
            <button class="btn-refresh"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>Clear</button>
          </div>
        </div>

        <div class="kpi-row">
          <div class="card kpi"><div class="kl">Active Sessions</div><div class="kv" style="color:var(--cyan)">3</div><div class="kd">1 browser</div></div>
          <div class="card kpi"><div class="kl">Requests / min</div><div class="kv" style="color:var(--amber-2)" id="kReq">1.2k</div><div class="kd">across all tabs</div></div>
          <div class="card kpi"><div class="kl">Behavioral Alerts</div><div class="kv" style="color:var(--green)">0</div><div class="kd">last 24h</div></div>
          <div class="card kpi"><div class="kl">Intercept Queue</div><div class="kv" style="color:var(--red)" id="kIntc">5</div><div class="kd">awaiting action</div></div>
        </div>

        <div class="bi-grid">
          <div class="col">
            <div class="card">
              <div class="panel-head"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="6" r="2.5"/><circle cx="18" cy="6" r="2.5"/><circle cx="12" cy="18" r="2.5"/><path d="M7.5 7.5 11 16M16.5 7.5 13 16M8 6h8"/></svg>Domain Graph<span class="right"><span class="badge-cyan"><span class="dot"></span>LIVE</span></span></div>
              <div class="dgraph"><canvas id="dgraph"></canvas></div>
            </div>
            <div class="card" style="flex:1;display:flex;flex-direction:column;min-height:0">
              <div class="panel-head"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/></svg>HTTP History<span class="right"><span class="badge-live"><span class="dot"></span>CAPTURING</span></span></div>
              <div class="hhead"><span class="hm">METHOD</span><span class="hu">URL</span><span class="hs">ST</span><span class="hsz">SIZE</span><span class="ht">TIME</span></div>
              <div class="http" id="http"></div>
            </div>
          </div>

          <div class="col">
            <div class="card">
              <div class="panel-head"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="14" rx="2"/><path d="M8 21h8"/></svg>Active Sessions</div>
              <div class="sess" id="sess"></div>
            </div>
            <div class="card" style="flex:1;display:flex;flex-direction:column;min-height:0">
              <div class="panel-head"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 4 5v6c0 5 3.5 8 8 9 4.5-1 8-4 8-9V5l-8-3Z"/><path d="M12 8v4M12 16h.01"/></svg>Intercept Queue<span class="right" id="intcCount">5 held</span></div>
              <div style="overflow-y:auto;min-height:0" id="intercept"></div>
            </div>
          </div>
        </div>
      </main>
      <div class="agent-fab" title="CyberForge Agent"><span class="fab-ping"></span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="7" width="16" height="12" rx="3"/><path d="M12 3v4M8 12h.01M16 12h.01M9 16h6"/></svg></div>
    </div>
    <div class="statusbar" id="statusbar"></div>
  </div>
</div>

<script src="cyberforge-shared.js"></script>
<script src="cf-header.js"></script>
<script src="cf-sidebar.js"></script>
<script src="cf-footer.js"></script>
<script>
buildHeader({status:'INTERCEPTING'});
buildSidebar('browser');
buildFooter({items:[{txt:'3 sessions',cls:'sb-cyan'},{txt:'1.2k req/min',cls:'sb-amber'},{txt:'5 intercepts',cls:'sb-amber'},{txt:'Capturing…',cls:'sb-green',spin:true}]});
fitWindow('win');

/* domain graph */
(function(){
  const cvs=document.getElementById('dgraph'),ctx=cvs.getContext('2d');
  let W=0,H=0,dpr=Math.min(window.devicePixelRatio||1,2);
  function resize(){const r=cvs.parentElement.getBoundingClientRect();W=r.width;H=r.height;
    cvs.width=W*dpr;cvs.height=H*dpr;cvs.style.width=W+'px';cvs.style.height=H+'px';ctx.setTransform(dpr,0,0,dpr,0,0);}
  resize();window.addEventListener('resize',resize);
  // center = browser, ring of domains
  const domains=[['acme-corp.io','#43e08a'],['google.com','#2bd4ee'],['cdn.cloudflare','#2bd4ee'],['okta.com','#2bd4ee'],['duckdns.org','#f4495e'],['fonts.gstatic','#5aa9e6'],['analytics.x','#5aa9e6'],['free-prizes.xyz','#f4495e']];
  let pulses=[];
  function frame(t){
    if(W<2){requestAnimationFrame(frame);return;}
    ctx.clearRect(0,0,W,H);
    const cx=W/2,cy=H/2,R=Math.min(W,H)*0.34;
    const pos=domains.map((d,i)=>{const a=i/domains.length*Math.PI*2 + t*0.0001;return [cx+Math.cos(a)*R,cy+Math.sin(a)*R];});
    // edges
    pos.forEach((p,i)=>{ctx.strokeStyle='rgba(126,148,184,.12)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(p[0],p[1]);ctx.stroke();});
    // pulses
    if(Math.random()<0.18){const i=Math.floor(Math.random()*domains.length);pulses.push({i,t:0,out:Math.random()<0.5});}
    pulses=pulses.filter(p=>{p.t+=0.04;if(p.t>=1)return false;const tt=p.out?p.t:1-p.t;
      const x=cx+(pos[p.i][0]-cx)*tt,y=cy+(pos[p.i][1]-cy)*tt;
      ctx.fillStyle=domains[p.i][1];ctx.shadowColor=domains[p.i][1];ctx.shadowBlur=7;ctx.beginPath();ctx.arc(x,y,2.6,0,7);ctx.fill();ctx.shadowBlur=0;return true;});
    // domain nodes
    pos.forEach((p,i)=>{const c=domains[i][1];
      ctx.fillStyle=c;ctx.beginPath();ctx.arc(p[0],p[1],4,0,7);ctx.fill();
      ctx.fillStyle='rgba(200,215,235,.7)';ctx.font='9px JetBrains Mono, monospace';ctx.textAlign=p[0]<cx?'right':'left';
      ctx.fillText(domains[i][0], p[0]+(p[0]<cx?-8:8), p[1]+3);});
    // center browser
    ctx.fillStyle='#0d1320';ctx.strokeStyle='rgba(245,166,35,.5)';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.arc(cx,cy,15,0,7);ctx.fill();ctx.stroke();
    ctx.fillStyle='#ffb84d';ctx.font='10px JetBrains Mono';ctx.textAlign='center';ctx.fillText('⚿',cx,cy+3);
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();

/* HTTP history stream */
(function(){
  const http=document.getElementById('http');
  const methods=[['GET','get'],['GET','get'],['GET','get'],['POST','post'],['PUT','put'],['DELETE','del']];
  const hosts=['acme-corp.io','google.com','cdn.cloudflare.net','okta.com','fonts.gstatic.com','api.acme-corp.io','duckdns.org'];
  const paths=['/api/v2/user','/track','/auth/token','/assets/app.js','/gate.php','/search?q=','/static/css/main.css','/events/ingest','/.well-known/jwks'];
  function add(){
    const m=methods[Math.floor(Math.random()*methods.length)];
    const r=Math.random();const st=r<0.82?['200','ok']:(r<0.92?['302','ok']:(r<0.97?['404','warn']:['503','err']));
    const host=hosts[Math.floor(Math.random()*hosts.length)];const bad=host==='duckdns.org';
    const path=paths[Math.floor(Math.random()*paths.length)];
    const el=document.createElement('div');el.className='hr';
    const now=new Date();const ts=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0')+':'+String(now.getSeconds()).padStart(2,'0');
    const sz=(Math.random()*40).toFixed(1)+'k';const dur=(8+Math.random()*180).toFixed(0);
    el.innerHTML='<span class="hm '+m[1]+'">'+m[0]+'</span><span class="hu" style="'+(bad?'color:#ff7185':'')+'">'+host+path+'</span>'+
      '<span class="hs '+st[1]+'">'+st[0]+'</span><span class="hsz">'+sz+'</span><span class="ht">'+ts+'</span>';
    const det=document.createElement('div');det.className='hr-det';
    det.innerHTML='<div class="dl"><span class="dk">'+m[0]+'</span> https://'+host+path+'</div>'+
      '<div class="dl"><span class="dk">status</span> '+st[0]+' · '+sz+' · '+dur+'ms'+(bad?' · <span style="color:#ff7185">flagged: malware C2</span>':'')+'</div>'+
      '<div class="dl"><span class="dk">req</span> accept:*/* · ua:Chrome/148 · tls:1.3</div>'+
      '<div class="dl"><span class="dk">resp</span> content-type:application/json · cache:miss</div>'+
      '<div class="timing"><i style="background:var(--cyan);width:'+(15+Math.random()*20)+'%"></i><i style="background:var(--amber);width:'+(20+Math.random()*30)+'%"></i><i style="background:var(--green);width:'+(15+Math.random()*25)+'%"></i></div>'+
      '<div class="dl" style="color:var(--faint)">dns · connect · ttfb · download</div>';
    el.addEventListener('click',()=>{el.classList.toggle('open');det.classList.toggle('open');});
    http.prepend(det); http.prepend(el);
    while(http.children.length>90){http.lastChild.remove();}
  }
  for(let i=0;i<16;i++)add();
  setInterval(add,360);
})();

/* sessions */
const user='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="9" r="3"/><path d="M5 20a7 7 0 0 1 14 0"/></svg>';
document.getElementById('sess').innerHTML=[
  ['Chrome · Tab 1','acme-corp.io · 14 req/s'],
  ['Chrome · Tab 2','mail.o365.com · 3 req/s'],
  ['Chrome · Tab 3','okta SSO · idle']
].map(s=>'<div class="sr"><span class="sav">'+user+'</span><div class="sinfo"><div class="su">'+s[0]+'</div><div class="sm">'+s[1]+'</div></div><span class="sdot"></span></div>').join('');

/* intercept queue */
const intc=[
  ['POST','duckdns.org/gate.php'],['GET','free-prizes-login.xyz/verify'],['POST','acme-corp.io/api/export'],
  ['PUT','okta.com/sessions/refresh'],['GET','cdn.unknown-host.ru/p.js']
];
const intcEl=document.getElementById('intercept');
function renderIntc(){
  intcEl.innerHTML=intc.map((it,i)=>
    '<div class="intc" data-i="'+i+'"><div class="ih"><span class="hm '+(it[0]==='GET'?'get':it[0]==='POST'?'post':'put')+'">'+it[0]+'</span><span class="iurl">'+it[1]+'</span></div>'+
    '<div class="iact"><button class="ibtn fwd" data-act="fwd" data-i="'+i+'">FORWARD</button><button class="ibtn drop" data-act="drop" data-i="'+i+'">DROP</button></div></div>').join('')
    || '<div style="padding:24px;text-align:center;color:var(--faint);font-family:var(--mono);font-size:11px">Queue empty — all requests forwarded</div>';
  document.getElementById('intcCount').textContent=intc.length+' held';
  document.getElementById('kIntc').textContent=intc.length;
  intcEl.querySelectorAll('.ibtn').forEach(b=>b.addEventListener('click',()=>{intc.splice(+b.dataset.i,1);renderIntc();}));
}
renderIntc();

setInterval(()=>{document.getElementById('rpm').textContent=(1100+Math.floor(Math.random()*300))+' req/min';
  document.getElementById('kReq').textContent=(1.1+Math.random()*0.4).toFixed(1)+'k';},1500);
</script>
</body>
</html>
