<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Forge AI - Advanced Security Platform</title>
    
    <!-- Core Stylesheets -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/enhanced-sidebar.css">
    
    <!-- External Dependencies -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    
    <!-- Chart.js for analytics -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
</head>
<body>
    <div id="app" class="app">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <div class="logo-section">
                    <div class="logo">
                        <i class="fas fa-shield-halved"></i>
                        <span class="logo-text">Cyber Forge</span>
                    </div>
                </div>
                
                <div class="header-center">
                    <div class="global-search">
                        <i class="fas fa-search search-icon"></i>
                        <input type="text" id="global-search" placeholder="Search threats, analyze URLs, or ask AI..." />
                    </div>
                </div>

                <div class="header-actions">
                    <div class="status-indicators">
                        <div class="status-item" id="backend-status" title="Backend Connection">
                            <div class="status-dot offline"></div>
                            <span>Backend</span>
                        </div>
                        <div class="status-item" id="ml-status" title="ML Services">
                            <div class="status-dot offline"></div>
                            <span>AI</span>
                        </div>
                    </div>
                    
                    <div class="header-controls">
                        <button class="control-btn" id="notifications-btn" title="Notifications">
                            <i class="fas fa-bell"></i>
                        </button>
                        <button class="control-btn" id="theme-toggle" title="Toggle Theme">
                            <i class="fas fa-sun"></i>
                        </button>
                        <button class="control-btn" id="settings-btn" title="Settings">
                            <i class="fas fa-cog"></i>
                        </button>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Layout -->
        <div class="main-layout">
            <!-- Modern Sidebar -->
            <aside class="sidebar" id="sidebar">
                <ul class="nav-menu">
                    <li class="nav-section-title"><span>Core</span></li>
                    <li class="nav-item active" data-screen="dashboard">
                        <a href="#" class="nav-link">
                            <i class="nav-icon fas fa-home"></i>
                            <span class="nav-text">Dashboard</span>
                            <span class="tooltip">Dashboard</span>
                        </a>
                    </li>
                    <li class="nav-item" data-screen="real-time-monitor">
                        <a href="#" class="nav-link">
                            <i class="nav-icon fas fa-chart-line"></i>
                            <span class="nav-text">Real-time Monitor</span>
                            <span class="tooltip">Real-time Monitor</span>
                        </a>
                    </li>
                    <li class="nav-item" data-screen="threat-center">
                        <a href="#" class="nav-link">
                            <i class="nav-icon fas fa-exclamation-triangle"></i>
                            <span class="nav-text">Threat Center</span>
                            <span class="alert-badge" id="threat-count">0</span>
                            <span class="tooltip">Threat Center</span>
                        </a>
                    </li>

                    <li class="nav-section-title"><span>Analysis</span></li>
                    <li class="nav-item" data-screen="deep-analysis">
                        <a href="#" class="nav-link">
                            <i class="nav-icon fas fa-microscope"></i>
                            <span class="nav-text">Deep Analysis</span>
                            <span class="tooltip">Deep Analysis</span>
                        </a>
                    </li>
                    <li class="nav-item" data-screen="ai-assistant">
                        <a href="#" class="nav-link">
                            <i class="nav-icon fas fa-robot"></i>
                            <span class="nav-text">AI Assistant</span>
                            <span class="tooltip">AI Assistant</span>
                        </a>
                    </li>
                     <li class="nav-item" data-screen="ai-insights">
                        <a href="#" class="nav-link">
                            <i class="nav-icon fas fa-lightbulb"></i>
                            <span class="nav-text">AI Insights</span>
                             <span class="tooltip">AI Insights</span>
                        </a>
                    </li>

                    <li class="nav-section-title"><span>System</span></li>
                    <li class="nav-item" data-screen="settings">
                        <a href="#" class="nav-link">
                            <i class="nav-icon fas fa-cog"></i>
                            <span class="nav-text">Settings</span>
                            <span class="tooltip">Settings</span>
                        </a>
                    </li>
                    <li class="nav-item" data-screen="profile">
                        <a href="#" class="nav-link">
                            <i class="nav-icon fas fa-user-circle"></i>
                            <span class="nav-text">Profile</span>
                            <span class="tooltip">Profile</span>
                        </a>
                    </li>
                </ul>

                <div class="sidebar-footer">
                    <button class="sidebar-toggle" id="sidebar-toggle" title="Collapse Sidebar">
                        <i class="fas fa-chevron-left"></i>
                    </button>
                </div>
            </aside>

            <!-- Main Content Area -->
            <main class="content-area">
                <div id="screen-container" class="screen-container">
                    <!-- Screens will be dynamically loaded here -->
                </div>
            </main>
        </div>
    </div>

    <!-- Utility Scripts -->
    <script src="utils/api-client.js"></script>
    <script src="utils/websocket-manager.js"></script>
    <script src="utils/notification-system.js"></script>
    <script src="utils/theme-manager.js"></script>
    
    <!-- Screen Scripts -->
    <script src="screens/dashboard.js"></script>
    <script src="screens/real-time-monitor.js"></script>
    <script src="screens/threat-center.js"></script>
    <script src="screens/deep-analysis.js"></script>
    <script src="screens/ai-assistant.js"></script>
    <script src="screens/ai-insights.js"></script>
    <script src="screens/settings.js"></script>
    <script src="screens/profile.js"></script>
    
    <!-- Main Application Controller -->
    <script src="app.js"></script>
</body>
</html>
