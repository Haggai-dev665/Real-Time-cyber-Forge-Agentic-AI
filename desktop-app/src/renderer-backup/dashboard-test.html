<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Forge AI - Enhanced Dashboard</title>
    <link href="enhanced-styles.css" rel="stylesheet">
    <link href="enhanced-dashboard.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #0f0f23, #1a1a2e);
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .test-container {
            padding: 2rem;
            text-align: center;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .logo {
            font-size: 3rem;
            margin-bottom: 1rem;
            color: #00f5ff;
        }

        .title {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 1rem;
            background: linear-gradient(90deg, #00f5ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 2rem;
        }

        .status-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
            max-width: 800px;
            width: 100%;
        }

        .status-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.05));
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 1.5rem;
            backdrop-filter: blur(10px);
            text-align: center;
            transition: all 0.3s ease;
        }

        .status-card:hover {
            transform: translateY(-5px);
            border-color: rgba(0, 245, 255, 0.3);
            box-shadow: 0 10px 30px rgba(0, 245, 255, 0.2);
        }

        .status-icon {
            font-size: 2rem;
            margin-bottom: 1rem;
            color: #00f5ff;
        }

        .status-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin: 0 auto;
            background: #ff4757;
            animation: pulse 2s ease-in-out infinite;
        }

        .status-indicator.online {
            background: #00ff88;
        }

        .load-dashboard-btn {
            margin-top: 2rem;
            padding: 1rem 2rem;
            background: linear-gradient(135deg, #00f5ff, #0099ff);
            border: none;
            border-radius: 12px;
            color: #ffffff;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .load-dashboard-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 245, 255, 0.3);
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.5;
                transform: scale(1.2);
            }
        }
    </style>
</head>
<body>
    <div class="test-container">
        <div class="logo">
            <i class="fas fa-shield-alt"></i>
        </div>
        <h1 class="title">Cyber Forge AI</h1>
        <p class="subtitle">Enhanced Real-Time Security Dashboard</p>
        
        <div class="status-grid">
            <div class="status-card">
                <div class="status-icon">
                    <i class="fas fa-server"></i>
                </div>
                <div class="status-title">Backend Service</div>
                <div class="status-indicator" id="backendStatus"></div>
            </div>
            
            <div class="status-card">
                <div class="status-icon">
                    <i class="fas fa-brain"></i>
                </div>
                <div class="status-title">AI/ML Services</div>
                <div class="status-indicator" id="mlStatus"></div>
            </div>
            
            <div class="status-card">
                <div class="status-icon">
                    <i class="fas fa-globe"></i>
                </div>
                <div class="status-title">Browser Monitor</div>
                <div class="status-indicator" id="browserStatus"></div>
            </div>
        </div>
        
        <button class="load-dashboard-btn" onclick="loadFullDashboard()">
            Load Enhanced Dashboard
        </button>
    </div>

    <script>
        // Check service status
        async function checkServices() {
            try {
                // Check backend
                if (window.electronAPI?.healthCheck) {
                    const backendResult = await window.electronAPI.healthCheck();
                    updateStatus('backendStatus', backendResult.success);
                }

                // Check ML services
                if (window.electronAPI?.mlService?.healthCheck) {
                    const mlResult = await window.electronAPI.mlService.healthCheck();
                    updateStatus('mlStatus', mlResult.success);
                }

                // Browser monitoring (placeholder)
                updateStatus('browserStatus', false);
            } catch (error) {
                console.error('Service check failed:', error);
            }
        }

        function updateStatus(elementId, isOnline) {
            const element = document.getElementById(elementId);
            if (element) {
                element.className = isOnline ? 'status-indicator online' : 'status-indicator';
            }
        }

        function loadFullDashboard() {
            // Create and load the enhanced dashboard
            document.body.innerHTML = `
                <div style="padding: 2rem; text-align: center; color: #ffffff;">
                    <h2>Loading Enhanced Dashboard...</h2>
                    <div style="width: 60px; height: 60px; border: 4px solid rgba(0, 245, 255, 0.1); border-top: 4px solid #00f5ff; border-radius: 50%; animation: spin 1s linear infinite; margin: 2rem auto;"></div>
                </div>
                <style>
                    @keyframes spin {
                        0% { transform: rotate(0deg); }
                        100% { transform: rotate(360deg); }
                    }
                </style>
            `;

            // Load the full dashboard after a brief delay
            setTimeout(() => {
                window.location.href = 'enhanced-dashboard-full.html';
            }, 2000);
        }

        // Initialize when page loads
        document.addEventListener('DOMContentLoaded', () => {
            checkServices();
            
            // Check services every 10 seconds
            setInterval(checkServices, 10000);
        });
    </script>
</body>
</html>
